front:
  text: 天童寺為浙江鄞縣太白山之名寺乃四明甲剎東南數千里亦皆推為第一太白山又名天童山位於鄞縣之東距治六十里晉永康元年二九一太白祖師義興始結茅菴於此漸成精舍後毀於孫恩之亂唐開元二十年七三二法璿禪師重建精舍至德二年七五七宗弼禪師徙建精舍於太白峰下乾元二年七五九敕賜精舍為天童玲瓏寺咸通十年八六九賜改名為天壽寺宋景德四年一七賜改為景德禪寺紹興二年一一三二宏智禪師正覺始建僧堂紹興四年一一三四範千銅佛列於閣紹熙四年一一九三重建千佛閣其後歷元明清三代屢有增修蔚為四明第一佛教聖地自晉永康以來海內禪宗群尊為祖庭明洪武二十五年一三九二定名為天童禪寺曾稱為天下禪宗五山之第二其於禪宗之地位可知明嘉靖年間楊明輯天童寺集七卷崇禎五年一六三二張客卿等纂天童寺志崇禎十四年一六四一黃育祺重纂之清聞性道釋德介復參稽舊志為纂新志卷首為序山圖寺圖與凡例下分十考山川建置先覺盛典雲蹤法要塔像表貽轄麗附莊産附餘考各一卷都十卷山川建置於各名勝各軒亭下輒引前人詩文以注之先覺盛典雲蹤法要塔像等五門記歷代高僧之行誼與弘法要為存釋氏之文獻表貽一門則載有關天童之文字轄麗則詳附見之蕃寺亦引前人詩文注其下附餘一門則考雜事唯多附會全志各篇有正疏有附紀有正誤有質實有從正有存俟有應刪有附證參稽頗詳詮次明晰要為天童寺文獻之淵藪也茲據清嘉慶間重刋本景印天童寺志目次卷首序山圖寺圖凡例卷之一山川考卷之二建置考卷之三先覺考卷之四盛典考卷之五雲蹤考卷之六法要考卷之七塔像考卷之八表貽考卷之九轄麗考附莊産卷之十附餘考新纂天童寺志序四明天童之山與寺互相輝煥而僧與法兼著流傳苟無記載之善則山空寺老僧寂法湮其何以稱震旦之巨勝哉前觀舊志中未能包括古今之旨每以為歎蓋聞弘覺老人曾囑嘯堂和尚重輯之而嘯公知惢泉聞子乃淹博會禪之士命同弟子于石介公董其事但二公留心已久未成全書而補遺正誤詳略得宜余政暇屢訪道入山與諸公笑談忘倦雖無謝長溪雨飲玲巖之興頗有王荊公登臨舒嘯之懷得見是書十考山川建置僧譜法輪無不備矣行當刊布四方供入大藏以慰衆望因嘯公之請謹辨數語以識其槩郡長東海萊嵩李煦拜撰天童寺志序吾四明郡乘之著始于宋乾道圖經後則有寶慶諸志之出焉但名山巨剎之勝迹附載于郡邑志乘中未免略其所詳烏可無專志以詳之蓋其建置興廢歷歲久遠中間聖僧古德間起疊傳必有當代帝王懿親藩侯崇奉敬禮光耀法門加以元夫巨公學士大夫塔銘紀傳之表章詞流逸客蠟屐扶筇之題咏往往溢册盈篇留貽來世不有記載何從考稽肰欲窮搜廣輯衆體畢備勒成全書蓋亦難矣豫覽天童志而竊有幸也寺自晉永康以來海內禪宗羣尊為祖庭者歷千餘年于兹四方紳士遊吾里者輒指琳宮化城登臨覽勝憶少時經行斯地未愜幽尋今年春豫來山中恭祝今上聖天子萬壽憩止彌日竊歎林壑窅深藏蓄萬象諸天森列備極崇閎真佛國之奧區蘊靈秀而發光華胥在于此然則寺之專志豈可少哉鑑西惢泉聞子同竹窗介公慨前志之未備殫心搜輯積歲纍時遂與主席偉載乘公會萃而增續之釐為十卷次第具舉有條不紊書成乞豫言辨諸首豫惟志乘之作參稽貴詳證據貴核詮次貴明是書有正疏有參紀有質實有從正有存俟有附證體裁既當意義復該徵信補遺又何闕略之有吾知此志一出洵為太白名藍益增偉觀後有作者庶繼繼繩繩增修弗替可也郡人仇兆鰲撰天童寺志凡例十方國土悉是遮那法身衲僧家見山不是山見水不是水然後山是山水是水峩峩太白下瞰滄海千峰朝于斯萬派歸于斯凡巉嵓懸嶠澄潭幽壑皆兹山所有也豈曰氣之靈不為偉人而獨為是物也哉志山川考第一屢興屢廢蓋俟乎其人荒榛之中忽湧精藍丹堊炳煥天龍呵護昔世尊與天帝行次偶指地云此處宜建梵剎天帝即拈莖草云建剎已竟若人識得根源便知毫端現剎志建置考第二峴山記云望之隱然其名特著豈非以其人哉况荷負佛法之人乎自西晉開山以迄于今如滄海潮如冬枯木歷代老古錐向甚麼處去今乃點出光明面目現在志先覺考第三經云不親近國王王子大臣官長又云佛法付囑國王大臣夫緇林之士若非授受何依而住耶要知非我親近則大義明矣日月齊臨山林藉光志盛典考第四雲本無蹤以山為宅雲去山存巍然骨立誰謂有蹤無心出沒究竟忘其形影蹤迹者得列乎此中志雲蹤考第五正法眼藏自拈花破顏微笑始西天東土分為兩株別為五葉牆壁雷霆悟者方知臨濟道山僧無一法與人第一莫取山僧説處若是過量人向未舉以前撩起便行猶較些子志法要考第六童子聚砂皆成佛道塔之繇來尚矣若論妙法空諸所有豈留形迹乎雖然如是聖賢之軀非凡體可同火浴之際或設利騰空或舌齒不壞光耀千古遺此以治世用是志塔像考第七門庭不同互相鈍置知音者片言即玉投機者一喝成金如大慧杲于宏智覺之知音有𣦸姚崇生張説之目曾不以為病其于應菴直舉楊岐正脈屬之嗚呼以視今日之諸方為何如也志表貽考第八若論大地一體何有方內有何方外統攝無分在于名山大剎略加分寸或有法屬之攸關或有産業之相濟不得另立名以別之是以志轄麗考第九作史之法疑者闕焉所謂神通妙用運水搬柴則已矣奇特事何足道哉然所見所聞所傳聞無異辭者亦不得而略也志附餘考第十輯志敘繇太白山後學德介撰夫前人未了之事惟在後人繼之而後人以前人之心為心而後人之心亦慰耳若吾四明太白名山向無志可稽自有明嘉靖間楊白川隱士諱明者集山中之舊迹長庚位公刊行名天童寺集後于崇禎辛未延密曾祖主席次年張博士廷賔同白山師所修壬申志二卷辛巳秋江陰聞人黃介子諱育奇者訪道來山又為重輯與前志相符其中增收法語請啓定成四卷而李杲堂居士嘗與吾祖弘覺國師言及天童山志考述未備載在郡乘中詩文尚多遺缺當重纂為要務吾祖即屬公任事公言修志一事非博學淹通之士而不能遂舉里友聞惢泉名性道者居鑑湖晦迹著書席門深巷潛心內外籍志乘之事尤詳時師翁歸化鹿邀之商確囑遠法伯迎之入山時介亦同事後因他事所阻而中止暨我嘯堂老人主院事屢訂入山不果時師因寶積録之舉亦未得成苐惢泉與介留心已久輯未半公有邑乘之役及告終未幾而作古人介因承祖父之命乃殫心窮搜諸録前志未備者覶縷而補續之自壬申後八十年詩文未收者同偉兄俱略其所詳而綴拾之以繼前人之遺迹耳如同志者知積漸之功所成不知者未免眼中著屑余亦自揣若論法門宜空一切文字諸相是役也又落第二義矣
