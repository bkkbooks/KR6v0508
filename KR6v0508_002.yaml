body:
  text: 建置考上晉惠帝永康元年庚申太白祖師義興結茅菴於楊州部會稽郡縣東南山之東谷久之漸成精舍安帝隆安三年己亥太白精舍燬因孫恩之亂也唐玄宗開元二十年壬申天童禪師法璿重建精舍於江南道越州鄮縣太白山麓之東即興師故蹟是時祕書省正字郎萬齊融就精舍西南隅建多寶塔峭㧞凡數仞附紀齊融本州人以涇陽令入為祕書正字出刺徐州常撰阿育王山常住田記其文摛藻劉昫舊唐書文苑賀知章傳言神龍中知章與越州賀朝萬齊融揚州張若虛邢巨湖州包融俱以吳越之士文辭俊秀名揚於上京人間間往往傳其文則知當時建寶塔自有自記肅宗至德二載丁酉禪師宗弼曇總偕觀宗徙建精舍於太白峰下乾元二年己亥敕賜浙東明州鄮縣太白山精舍為天童𤫩瓏寺從平章第五琦所請以山有𤫩瓏巖也是時禪師清閒增建食堂事詳本傳又偕禪師曇德植夾道松二十里武宗會昌年間心鏡禪師藏奐徙清關潭神龍於太白峰頂建鎮蟒塔於小白嶺頭正疏相傳師自雲閒歷遊至山居久之以龍湫近在清關橋側行人易觸乃咒龍入鉢移之峯頂傾鉢成池龍即安焉又山中有蟒每為人患師以法度一日蟒死嶺上焚而瘞之因鎮以塔至今猶存宣宗大中元年丁卯禪師咸啟請以本寺充十方住持質實案司馬溫公稽古錄大中元年春復天下佛寺及僧尼時啟禪師從徑山開法是山因有此請附證延慶寺使帖云本院僧請依江南湖南道山門體式永作十方住持準中書省劄子奉聖旨宜令本院依久例指揮具結供申據僧司勘會本州天童山景德寺大梅山仙居院兩處亦是十方住持即依得上項江南湖南道山門體式如勘會天童大梅兩處不是十方住持甘伏深罪者奉聖旨依天童大梅兩處體式施行今本山唐劄雖不傳據此宋帖以本山準十方住持勘會體式足證當時法制之重懿宗咸通十年己丑有啟更賜浙東明州鄮縣天童𤫩瓏寺為天壽寺浙東觀察使楊嚴所請附證時嚴又嘗奏度三七僧奉阿育王山舍利塔宋真宗景德四年丁未敕賜浙東路明州鄞縣天童山天壽寺為景德禪寺大中祥符年閒禪師子凝重植夾道松二十里質實凝禪師植松載寶慶志性道仝竹窗介公覓東谷水筧下獲殘碣一小角篆額有植字其正文第一行有明州天童山植松七字第二行有子凝禪師聚間六字第三行有至小白嶺四字第四行惟一接字雖賸畫零鐫千秋而下亦靈光之照附紀建炎末宏智禪師來住本山先是嘗夢入一寺紀以詩有松徑森森窈窕門到時微月正黃昏之句及至是山夾道松陰恍符前夢距植松時百二十餘年矣時勝構之可紀者有東西四設利塔有蒙堂閣曰臨雲軒曰春樂亭曰宿鷺曰更幽宋龍圖信道舒亶蒙堂詩由來去住不相關贏得隨緣到處閒笑出海天飛一錫行分江月過千山微言定許誰人叩勝事偏於俗士慳咫尺蒙堂隔霄壤城東搔首只空還又臨雲閣詩高僧終日笑憑闌亦似無心懶出關幾度海風吹散雨坐看彩翠落人間又春樂軒詩隔水嵓花紅淺深花邊相對語幽禽管絃不到山間耳誰會憑闌此日心又宿鷺亭詩雲過千溪月上時雪蘆霜葦冷相依正緣野性如僧癖肎為游魚下釣磯編修放翁陸游宿鷺亭詩疎鐘迎客到溪亭碧瓦朱闌相照明想得松陰排萬衲籃輿到處恰詩成又更幽亭詩攀石捫蘿到更幽玲瓏咫尺懶窮搜旁人不會當時意為欠門生作伴遊明白川楊明宿鷺亭追詠池上幽亭面面凉水風山月足徜徉夜深休拍闌干嘯宿鷺沙頭夢正長高宗紹興二年壬子宏智禪師正覺始建僧堂正覺僧堂自記夫靈山之笑溫少林之坐寒東西繩繩三十三傳老盧受衣鉢而逃厥事顯著開闔歙張波瀾光燄肆口而說肆心而應道傳器受源深流長南嶽青原代以得人或默有所宗潛幽遠遯歸迹世外研究生死松食荷衣巢棲草座晦而不耀持養老成有慕其風師而親之鋤植舂炊采汲烹瀹溪毛原粟枯槁自甘來遠集繁乃建僧堂而統受焉齋之萃師友同事刳情刲智擯學黜思妙盡心空宗通眼活發越於設施果其能而備也建炎之末人病亂離湘漢江淮兵火燔掠尊宿叢林沒蕪八九毳衣瓶錫投棲於東南四明禪席素號小廬山郡東六十里天童道場山紆盤而氣幽松偃蹇而皮皴蒼壁附蘿烟晞而翠膩孤虹枕澗埃濯而清揚予住山之四年十方來學雲趨水赴屋不能容比丘行深遽來白事曰柏庭有子露坐簷宿殆無尋赤與受單鉢欲募淨信增大其堂得乎予頷之已而匠摉於林斧鳴於谷一年餘礎布楹列梁橫桷攢棼橑翼張甍瓦鱗覆前後十四間二十架三過廊兩天井下廡墻陼縱二百尺廣十六丈窗牖牀榻深明嚴潔萬指食息超搖容與謀始於紹興壬子之冬工畢於甲寅之春總費緡錢萬五千有奇冬溫夏凉晝香夜燈開鉢而飯洗足而坐耕牧其間警導以寂秋函古井春入化機淵兮默成粲兮用光水盈科而流石隨呼而響理契平等智應自然動靜威儀鍼砭相益撿責滲漏磨瑩瘢痕淬礪光芒錯礱圭角高標遠到追武古人丐心施方等不負其意器劣學獘希易欲速以機械為蹊放蕩為徑耕於空言餒無所穫戰於强辯勝無所歸見聞流習知解汩心佛祖之所訶魔外之得便其疵癘萌蘖治不可緩也登崑崙之丘決河源之水濯肝瞻之汚盪心目之翳生滅迹亡而妙存有無轍泯而過量大夜之夢破永劫之疑拔出家之志償行脚之事辦相從儔侶殆庶幾焉紹興四年甲寅宏智禪師建僧堂落成繼而拓舊維新巍其門為傑閣延袤兩廡範千銅佛列於閣上中建盧舍那閣旁設五十三參善知識前為二大池曰萬工中立七塔附紀郡丞浚儀李濂云入天童寺路徑如斗形雙池並深中築七塔以象斗外池有水碓磑寰宇歌註云天童池上七塔四白三赤白以生水赤以厭火紹興二十六年丙子試權起居中書舍人兼玉牒所檢討于湖張孝祥題小白嶺上之亭曰揖讓正疏是年宏智禪寺舉大慧禪師宗杲主阿育王山時大慧與張安國同過天童宏智迓之嶺上會於亭中兩師交讓無已乃不次而坐安國歎曰三代禮樂今歸釋氏矣因以揖讓名亭附紀歷陽張邵建炎初假禮部尚書使金補其弟祁為明州觀察推官因奉母居鄞之雷峯至今有張碩人墓即其母也祁在雷峯生子孝祥於方廣院中紹興甲戌科狀元邵生參知孝伯祕閣即之之父也孝祥擅書學高宗稱其必將名世宏智塔銘及後錄皆其手書昔人評即之書初學伯父晚失其法仕終顯謨閣學士明雙林僧幢海懷追詠主盟斯道兩齊肩一叚謙光尚藹然坐頃頓還三代禮典刑千載揖雲巔孝宗淳熙五年戊戌永興成德軍節度使雍州牧開府儀同三司判明州軍州提舉學事兼沿海制置使皇子魏王愷以太白山圖進上少保右丞相永國公史浩又奏請帝宸翰揮太白名山四大字賜天童山景德禪寺是年魏王妃某氏親書入山之亭曰鎖翠長溪臯羽謝翱鎖翠亭避雨詩客有游山衣著久如薜荔行行萬翠庭忽作風雨憩仰面無所睹梁間有題字問此何人書婉娩有弱氣云昔魏王妃學書如李衞乘雲到此山灑墨在空翠塵風吹土花倏忽景物異疑此夢與山不類人間世是年慈航禪師了樸建雲章閣於方丈恭藏御書太白名山真蹟嗣又別建一閣曰超諸有前於盧舍那閣複道聯之光宗紹熙四年癸丑虛菴禪師懷敞重建千佛閣日本千光師榮西航巨木來佐參政攻愧宣獻樓鑰千佛閣記淳熙五年孝宗皇帝親灑宸翰大書太白名山以賜天童山景德禪寺寺之門甚雄敞刻雲章尊閣其上又於方丈專建一閣以藏真蹟實為禪林盛事前所未有也初西晉永康中沙門義興卓菴此山有童子手給薪水後既有眾遂辭去曰吾太白一辰上帝以師篤於道行遣侍左右因忽不見自是始有太白天童之名山在郡東南六十里所太白一峯高壓千嶺雄尊深秀為一郡之望紹興初宏智禪師正覺欲撤其寺而新之謀於眾有蜀僧以陰陽家言自獻曰此寺所以未大顯者山川宏大而棟宇未稱師能為層樓傑閣以發越淑靈之氣則此山之名且將震耀於時矣覺深然之乃拓舊址謀興作內外鼎新以次就成智匠高妙務極崇侈門為高閣延袤兩廡鑄千佛列其上前為二大池中立七塔交暎澄澈遊是山者初入萬松關則青松夾道凡二十里雲棟雪脊層見林表而倒影池中未入寶閣已非人間世矣中建盧舍那閣尤為壯麗住山三十年其為久遠之計皆絕人遠甚後有慈航了樸一住亦二十年起超諸有閣於盧舍那閣之前複道聯屬至今巍然相望又大築海塗增益歲入由是天童不特為四明甲剎東南數千里亦皆推為第一游觀者必至至則忘歸歸而詫於人聲聞四方江湖衲子以不至為歉皇子魏惠憲王出鎮一見慈航懽若平生暇日來游顧瞻山林登玲瓏坐宿鷺或累日不忍去因圖以進於上會稽郡王太師史文惠公又從容奏請遂有四大字之賜瑰奇絕特之觀無以加矣十六年虛菴懷敞自天台萬年來主是剎百廢具舉追跡二老而千佛之閣歲久寖圮且將弗支猶以前人規模為未足以稱上賜欲從而振起更出舊閣及前二閣之上僉以為難師之志不回也先是日本國僧千光法師榮西者發願心欲往西域求教外別傳之宗若有告以天台萬年為可依者航海而來以師為歸及遷天童西亦隨至居歲餘聞師有改作之意請曰思報攝受之恩糜軀所不憚况下此者乎吾忝國主近屬他日歸國當致良材以為助師曰唯未幾遂歸越二年果致百圍之木凡若干挾大舶泛鯨波而至焉千夫咸集浮江蔽河輦致山中師笑曰吾事濟矣於是鳩工度材雲委山積列楹四十多日本所致餘則取於境內之山始建於紹熙四年季秋之甲申才三載告畢費緡錢二萬有奇是歲海莊倍稔贏穀三千斛如有相之者不求於人見者樂施以迄於成凡為閣七閒高為三層棟橫十有四丈其高十有二丈深八十四尺眾楹俱三十有五尺外開三門上為藻井井而上十有四尺為虎座大木交貫堅緻壯密牢不可拔上層又高七丈舉千佛居之位置面勢無不曲當外檐三內檐四檐牙高啄直如引繩旅楹有閑翬飛跂翼周延四阿繚以欄楯內為綺疏表裏明豁自下仰上如見崑閬梵唄磬鐘半空振響徜徉登覽四山下瞰河漢星斗如在欄檻御書金榜巍乎中峙翊以翔龍護以絳綃高出雲霄之上真足以彈壓山川傳示千古善財童子大莊嚴藏入見樓閣廣博無量則不可知若經行四方室屋巨麗殆未見其比也鑰奉祠東歸嘗往游焉驚歎傑特目眩神駭過於耳聞敞請記其事老矣學落不能形容姑記大畧以表吾鄉之勝海內好奇之士欲游而未遂者覽此則太白之景思過半矣虛菴道價素高禪子向方島夷亦聞其名而歸之加以願力深重才刃恢恢巧匠瑰才成此勝事觀此無不欽歎或請飾之敞曰殫力竭材幸濟登兹若丹臒華飾尚有賴於後之人云理宗寶祐四年丙辰寺災時觀文殿大學士沿海制置大使判慶元軍府事兼管內勸農使金陵郡開國公吳潛奏請住洞庭天王寺別山禪師祖智主寺興復至則結茅以居寶祐六年戊午別山智禪師建復寺宇寶閣景定四年癸亥簡翁禪師居敬主寺事復作千佛寶閣元成宗大德五年辛丑賜朝元寶閣額因東巖禪師淨日增新允慶元路守臣之請也英宗至治年間構疉秀軒於中峰太史文獻黃溍詩名山標巨剎樓閣在青冥別路通禪窟當軒列翠屏暝禽多雪色偃樹盡龍形負土新成塔非才愧勒銘存俟元袁學士桷清容集載題噩上人疉秀軒賦後云楚之辭不作久矣鼂無咎氏始分其言為二淵乎得其微旨離騷九歌判不相合漢魏而降一而為之縝密者為揚馬反復悲悼漢帝所謂鄰於楚之聲也左太沖融液藻繪能為一繼者不復若是鼂氏豈虛語哉吾鄉高端叔先生元之作變離騷直與古昔相抗而或者謂羇窮不偶怨悱不得以自振今噩上人作驃騎山賦及疉秀洌清二賦手而讀之誠駸駸乎古作矣渡江以來諸賢蹈襲蘇學以雄快直致為夸詩與文率相成風科舉學盛屈宋不入於口耳積弊幾二百年山林枯槁之士尚何能冀其髣象是則皆吾徒之罪也上人語精意新無模繫之弊言道也師遠遊託興也鄰九辯嗟乎余老矣上人當勉之投閒謝事願相與過從將復見於雪竇玉几諸山斯幸矣泰定二年閏月乙亥清容居士書性道家藏此跋無從覓曇噩賦豈神龍反見尾而不見首耶歲戊申余入山遠菴㒥公偶於殘石中得廢碑二角出以相示正其賦也勒漢隸甚精其一角第一行太白中峯疉秀軒賦凡八字第二行紛萬物之總總兮曾一氣之不殊凡十四字第三行之蚩蚩兮率資昏而質汚裂規矩凡十三字第四行履才辯兮衷慈忍之襜褕厲凡十一字第五行固摧落之餘也凡六字又一角第一行先殂憖遺後以凡六字第二行之粗也追先哲而會凡八字第三行岌九隴兮翠扶疎泊雙凡九字餘五行作行書即清容跋語又三行作小楷第一行太史一日持至翰林出示諸名賢讀之靡不稱歎第二行惜乎禪師平昔所製作素無遺稾蓋吾宗心空萬有第三行庶好事者得便觀覽焉洪武十二年歲己未九月初吉缺立石者名嗚呼斷文殘碣泉石猶香搜覓全篇雲烟多漫姑存之以俟博藏金石錄者補闕焉隨紀一詩一室堆亂峯寸心履小石時聞烟有聲到處嵐光積好畫不在幀好書不在冊惟吾意所之空翠皆堪摘願言懷幽人峩天半白願言思烈十奇巒森劍戟秋山即老僧春嶠浮仙客千里落雙眸萬疉歸咫尺我笑中峯中置身無氣骨獨立豈不能高下生肘腋何人構小軒疉秀夸臬卼松雲階上栖繞屋挂苔壁枯鉢響楚音聽者多感激乃得清容賞鱗藏尾弗沒毒龍不識字驅電焚蒼畫瑣屑遺斷章古香隨手發字字疉空濛秀色冷晴碧何問軒有無視今猶視昔文宗天曆二年己巳朝元閣燬順帝至正五年乙酉孚中禪師懷信重新佛殿至正十九年己亥原明禪師元良重建寶閣鑄萬銅佛居之司徒平章方國珍捐協以貲至正二十年庚子有敕仍賜寶閣額曰朝元中書參政臨川危素奉敕撰朝元閣碑銘至正二十年天童山景德禪寺新作大閣成宣政院臣以聞有敕賜名曰朝元閣復三年皇太子命太保右丞相臣搠思監請於上敕中書參知政事臣素撰述碑銘以賜刻石垂諸永世臣素按慶元郡城東走四十里有山盤亙高廣若抱圜珠晉永康中沙門義興廬於此山有童子日給薪水久而辭去曰上帝以師篤於道行故使以來吾太白星也寺經兵燼唐開元二十年高僧法璿按古跡造精舍於山之東麓祕書正字萬齊融建多寶塔於精舍西南隅法璿日誦法華經亦感太白星化為童子因名其山曰天童云至德中禪師曇總來自縉雲與禪師觀宗徙太白峯下乾元初相國第五琦請於朝遂賜天童玲瓏寺額宣宗時禪師咸啟始為十方禪剎宋建炎中宏智禪師正覺剙建千佛寶閣淳熙五年孝宗書太白名山贈僧了樸十四年禪師懷敞謀重新是閣時日本千光法師榮西依敞問道乃請曰某為國主近屬歸當助施材木越二年果至閣成而寶祐四年丞相崇國公吳潛奏請禪師祖智主之閣再建景定四年禪師居敬復作焉歲既久復燬大德三年禪師淨日益加聞於朝賜額朝元寶閣天曆間又燬至正十八年江浙行省咨宣政院奏起台之瑞嵓臣僧元良主寺事良覷堂宇殘缺產入寡薄於是刻心殫力日以興建為事明年秋臣左丞方國珍捐己資助工物未踰年而落成屋中為七間兩偏四間左鴻鐘右輪藏下為三間以通出入梁棟雲飛柱石山積榱題修敞面河注袤延綺疏青瑣甬道躡虛於阿迦尼吒之表崇十又三丈邃十丈廣廿又五丈用人力以工計則十萬用粟以石計萬又奇用楮幣以貫計百五萬鑄萬銅佛置閣中復堰海塗一十七頃於寧海牧峯以為香燈修造之川至於重構𣃼檀林庖湢眾屋不可殫紀今司徒平章臣國珍上其事於朝既賜臣僧元良之號曰善覺普光禪師遂有賜碑之命蓋自兵禍且一紀名山勝地浮圖氏之寺宇往往摧拉焚燒化為狐兔之穴草莽之墟獨慶元諸剎得以無事臣國珍能於斯時保境而安民觀諸天童之事其功有足書者論者謂臣僧元良審以發謀斷以行事惠以使下則貪者勸勤於率眾則怠者勉此其所以成功速而樹業隆也昔懷敞師之樹閣則有宋參政樓鑰實紀其蹟距今百八十年之久而其文章烜赫照耀千古臣素之寡陋安能執筆以奉明命謹拜手稽首而為之銘曰峩峩太白鄮山惟高其高伊何下瞰海濤奠厥精藍肇於西晉唐宋以還宗門大振有巋傑閣上摩雲霄屢廢而興突於層杓攘攘域中兵革蝟起眷兹甬東民物完美締構竣事航海上聞何以名之錫之朝元粲彼眾星北拱辰極孰曰彼邦天威咫尺寶藏所儲三學之書觀諸義諦湛彼玄珠華鐘擊撞天龍竦聽冥冥晨昏發我深省政臣承詔庸述因緣升中於天天子萬年分司郎中劉仁本朝元閣題句山勢奔如海湧潮朝元錫閣構岧嶤曾招太白星辰下獨倚空青烟霧飄金素原題句雲從太白山頭起香自朝元閣上飄白馬馱經來絕域紫泥封詔下層霄李五峰題句雲埋洞口蛟龍伏日落峯腰紫翠圍寶閣珠宮常散彩宸章金榜亦交輝明司𡨥仲能程徐詩翠微高聳倚雲霄金碧浮圖第一嶣崦嶂慈雲森殿閣湖山暮雨半漁樵敕書璿榜題前代妙乘珠函祝聖朝莫問當年總陳迹天香裊娜寶花飄是時百廢具舉有法堂有大鑒堂有東西蒙堂有梅屋此軒疉秀軒樓則有疉翠有望月有鐘有鼓藏則有轉輪退居則有旃檀林寮則有四禪有耆舊有老郎閣曰涵虛亭曰印月曰清關曰隱蓋隱蓋之外有山門室則有水碓橋則有磨茶有金莊樹之奇古者有獅子柏器之異鉅者有千僧鑊正疏良禪師自元末至明初皆住本山故其建置實繁昔時大鑒堂中有一圖白川楊明猶及見之謂是元時故物故白川各有題詠大鑒堂額宋文憲公濂所篆梅屋者有了菴欲禪師追和天童滅翁祖梅屋偈云太白山頭第一層一枝春信見無能何年飄落人間世散作人間六月冰此軒者良禪師曾延實菴茂禪師居此疉翠樓在大鑒堂前白川有詩云危樓起山阿山深樹重疉虛檐雲氣浮淨几幽光接其額羅雙塘所書鐘樓在朝元閣左輪藏在閣之右鼓樓在內萬工池外旃檀林豐南禺坊補書額白川有四禪寮詩云松寮寂寂月蒼蒼一琖燈縣夜影長禪老定中心自息不知門外虎廵廊又耆舊寮詩云山中緇侶各龎眉笑聚松堂何所為試取虎泉烹細茗臨風坐啜兩三瓷又老郎寮詩少壯用其力衰老焉能棄食此畢餘生熙熙樂生聚又涵虛閣詩池上倚高閣涵虛心廓然清風生兩腋俯見波中天樹影落吾手山光橫几前何須跨黃鶴萬里凌紫烟印月亭臨池而建清關亭即在橋上白川磨茶橋詩春茶成月團必假磨礱力橋畔聽經人茶香聞月夕又金莊橋詩金川莊已蕪莊外橋仍在我時踏月過惟有清風待從正獅子柏者舊傳有柏在萬工池上晉義興祖師所植曰此柏垂池吾當再出今佛殿下有柏根幹蟠拏枝葉猙獰風來振吼宛肖獅子謂即義師所手植詎知義師結菴在東谷而池則成於宋時安得有垂池之說况今柏不臨池蓋唐徙寺在太白峯下時所種非晉植也參紀千僧鑊以斤計者七千深廣各八尺歲久明瑩魚入輒死在殿右輪藏下此楊白川寺集所紀也又名漏沙鍋者謂鍋底有小穴相傳漏沙不漏米為寒山拾得靈蹟自天台國清飛來明萬曆閒為洪水所壞故鐵尚存此白山僧壬申寺志所紀也參而斷之曰魚游釜底是名放生謂輒死者眼欠分明既能飛來何不飛去洪水湯湯豁然大悟明太祖洪武二十五年壬申冊天下寺名以浙江寧波府鄞縣天童山景德禪寺定名天童禪寺稱天下禪宗五山之第二成祖永樂十三年乙未歸併天下寺觀以佛隴盤山二靈珠山寺僧歸併天童禪寺是時重植夾道二十里松已成拱把質實永樂鄞志云二十里松歲久無存寺僧新植者今漸成拱把矣宣宗宣德三年戊申寺殿燬宣德七年壬子住持圓愷重建殿閣像設維新正疏殿高一十三丈廣一十二丈深八丈四尺左右翼以伽藍祖師二堂各廣二丈六尺佛天羅漢像設備極精麗敬宗正統六年辛酉無傳禪師宗孠合眾鑄洪鐘自為銘體元靜扣而應用則神誠夫性噫惟汝不傳之令閏十一月廿七日鑄是歲住僧宗正又鑄鐵鑪雙瓶世宗嘉靖十四年乙未鄞隱士白川楊明輯天童寺集七卷集既成萬曆間住僧無憂萬懽增編鷲峯正位授梓明自序略天童為天下禪宗五山之一禪教大振於天下其山蜿蜒起伏盤廻隱暎層巒疊嶂嵸巃嶻𡺼豐林喬木薈蔚蔥菁綿亙二十餘里夾道松行翠陰蒼靄如行水簾洞中炎月凉颸令人灑然心快到寺廓為邃谷衍為平疇峯巒環拱嵓竇窅深溪流清激竹樹嘉美風日晴和洞開軒窗則青山白雲盡在几席誠棲真學道之奧區達士名賢之所樂游者也惜乎碑碣毁湮遂使先代建置之勛古人題詠之蹟俱不見於世猶幸存一圖於大鑒堂擬謂元時故物披閱之景物森然在目昔時僧眾統一今則分食各居古風不復可見夫地以人而勝景以文而傳豈亦有所待耶嘉靖乙未春白川子假館於兹鉛槧之暇因歷訪故蹟蒼烟灌莽觸目凄然而先賢文字亦所罕見余是以旁搜徧訪修斷簡拾遺篇得近代詩文若干又得懷讓吟稿若干并余瓦缶之音釐為七卷名曰天童寺集付之住山隆昂二公倘能好事梓而行之庶幾名山勝蹟不遂泯沒無聞而湖海好奇之士足迹所未至者亦可為臥遊博笑之一助云嘉靖三十四年乙丣夾道松遭伐以日本猝警備艦防海也從正二十里松按籍可徵者始植於唐之乾元再植於宋之祥符迨元末明初已成三植其間尚有缺紀者至是殆絕壬申寺志註萬松關下言其松歷唐宋元迨明為一有力者所伐真成夢囈傳法而住持有明至宣德時無傳孠禪師稱七十二代大用機禪師稱七十五代此後中斷其閒圓愷惟著興建之勛承法無聞焉凡書住持而不書禪師者示別也會典事例載天順八年詔京城內外寺觀今後不許增修請額他可知矣自此佛教寖衰如本山名剎亦更十方住持之制分房凡四與常住為五莊產各持茶香筍熟饕於勢家龍角雞丸謀於俗姓斸塔毁碑無所不至猶幸住持一二老宿勉力攝延保此殿閣以故不廢游詠者迨洪水降警而勝構遂不可問嗚呼興替不常循環治亂余故述往蹟分次游寺歷詠於此訖明萬曆洪水以前為建置考之上宋二見謝翱雨宿詩城中家斧冰此地絕炎蒸天食青童捧龍居白氣升暗燈猶宿火寢服尚衷繒客話從前事書傳入內僧風流今獨盡雲物老相仍淨榻搜凉臥危闌入醉凭雨師行下界鳥夢識中乘明發甬南去他山逢智弘元二見金原素詩喜尋方外友特地到天童松徑二十里雲山千萬重倚窗僧聽雪隔岸鳥呼風游憩歸何晚舟行夜半鐘二見李五峰詩甬東東頭望天童金銀夜氣雜雲濃却逢春雨兩三日洗盡北山千萬重奴子肩輿頻勸下老僧强飯已鳴鐘歸來城郭應回首太白山前廿里松明蒲菴見心來復對雪詩玉龍顫曉朔雲屯滕六吹花積厚坤凍合白峯天不夜光吞大地月無痕消冰成水應能辨會色歸空孰與論老我難禁寒徹骨玲瓏松火喜春溫去年旅寓北山陰踏雪茅堂三尺深紫禁有詩曾應制少林無法可安心梅花月霽僧初定芋火烟寒客獨吟今日南歸重聚首天光如對閬峯岑正科薛士銘詩行盡名山廿里松峯巒重護梵王宮層樓壯麗巍千尺一沼清泠紀萬工茶攪酥酡分玉乳飯供香積下金童我來暫借蒙堂宿臥聽頻伽弄晚風比部大本張得中詩廿里松關鎖白雲上方樓殿絕纖塵好山矗矗鼇頭湧流水濺濺虎跡陳燈鏡交輝天不夜幡花鬬彩地長春凭闌極目情無限吟罷凉風灑葛巾湖海禪林太白山我生今亦此躋攀回頭便覺紅塵遠適興何妨白日閒瑞靄深籠千佛閣祥烟密護萬松關石窗燈火餘光在再毓曇華出世間廷尉季爵夏時正詩陰陰九隴六均峯靉靉春雲護遠空二十里松千丈嶺兩重山閣一聲鐘林閒問道滄洲客石上聽經碧漢龍五百年前香積飯二時天外走青童中丞定齋王應鵬詩十里青松接翠微梵王宮殿白雲飛鐘聲出岫客初到月色滿庭僧未歸偶有閒情依淨土竟無塵慮瀆天機明朝尚有登高興萬仞岡頭一振衣硯溪盧鎮詩高世原非志名山獨有緣為探諸法界來上萬松巔嵓瀑晴飛雪林坰夕起烟便應尋惠遠結社共長年方伯仁仲李麟詩興逃方外翠微間問道西來此日閒仙鶴低回疑五鳳禪心寂歷面三山傳燈片月空中落結夏孤雲定裏還匹馬遁公頻著眼為憐神駿邈天顏州守徐栻吟句日影正縣亭午塔松聲先度隔雲鐘溪叔周濂吟句雲間遠樹雲邊寺屋上清泉屋下山雲遊無住子題壁杖錫今來此春歸欲夏時丹崖秀凌漢嘉樹綠連池澗落飛泉急山崇古殿危穹碑臥苔蘚猶誦昔人詩轂齋鄭槮吟句幾處人烟分下界半空僧磬散清音友璧陳璋吟句滿山筍老多成竹一路花香半是茶吉安守三岡葉應驄詩賞心隨處物吾偕上巳登臨景更佳猶喜山僧能曠達不妨仙客共詼諧茗杯淨澣三更月詩墨淋漓萬仞崖擾擾風塵渾擺脫相將身世到無懷三見張憬詩白帝司辰海國秋不禁清夢到滄洲風生遠浦朝聞笛月出青關夜飯牛落葉滿庭僧自歸亂雲遮戶客還留丹山赤水從吾好不用題書汗漫遊考功南禺豐坊詩倚天古殿雕金麗落澗鳴泉佩玉新何得盡逃塵世業結茅終日對松筠司馬東沙張時徹詩生平只自愛青山夢想清泉碧樹間鷲嶺半穿黃葉路石門遙度白雲關林中猿鶴僧偏狎木末星辰客共攀五岳遨遊空遠興聊從此地避塵寰相國蛟門沈一貫詩我來尋淨土廿里憩松陰池色空諸有山光明佛心金精歸上界琪樹隱中林明發慈雲嶺禪關白月深陳復言詩萬疊青螺絕點埃分明此地勝蓬萊祇園玉樹無時老優鉢羅華盡日開不雨白雲飛欲去如花紅葉落將來我今憩此無窮意滄海茫茫問渡杯劉炌詩羣峯來太白環撫碧嵸巃金殿當溪口松關立徑中泉流雜梵磬雲籟山鐘月印龍堂靜真僧了定空侍御東磐徐待詩溪頭緩步石苔斑面面楓林破醉顏看盡暮雲東入海送餘返照北當山魚潛清水芙蓉靜鶴隱青松石洞閒僧舍林深無侗事未昏鐘動掩三關清卿漢城余寅詩長庚來寶地帝遣護禪關象設虛無外玄通窈窕間白雲閒在野明月靜于山老檜離奇甚應知說大還勳卿會之吳禮嘉詩塵世勞勞幾日閒漫將屐齒印青山竹過梅雨晴猶溼鶴帶松雲去復還浸月雙池浮七塔倚天孤殿撫三關何時太白星重下欲乞金精駐玉顏伯翼楊承鯤詩天上羣峯到寺門千年長禮聖僧尊雲生合殿雙龍戲雨度空山萬馬奔法相不知何世界古碑猶記晉乾坤旃檀寂莫金花落坐想寒鐘下遠村偉卿三橋李瑋詩連峯奔馬積陰長十里松行上上方世遠事猶傳太白雲深興欲覓中黃日臨池影搖蟲吻風遞泉聲入土囊老衲定回無一事蒲團共話紫茸香建置考下明神宗萬曆十五年丁亥七月二十一日太白龍見乘風鼓雨洪水懷山寺盡圮礎礫無一存者二見沈明臣紀災詩千載天童寺名山大海東丹青餘古殿像塑儼新工佛亦難逃劫塵應總是空滄桑陵谷變百六數誰窮郡丞武陵伯貞龍德孚賑饑經寺詩太白知何處天童尚有名池渟金液水山繞蕊珠城護法龍空臥啼飢鳥亂鳴飄風摧棟宇牢落不勝情褰帷乘俗駕卓錫問名山貌以憂民瘦心因學道閒樓空峯崒嵂林密鳥間關不照龍潭水風塵客子顏是歲冬延住持僧因懷重建法堂萬曆三十年壬寅住僧傳僖重建鐘樓紫柏達觀真可感言四明三佛地海闊魚龍鯹天童與雪竇法鼓久不鳴萬曆四十三年乙卯住僧慧高偕緇素六人詣金陵請印大藏附紀高號寶峯藏既得請高以病逝偕行者繼殞其三懷宗崇禎二年己巳住僧明貫介姚江張孝廉廷賓奉闔郡檀越諸函迎密雲禪師於金粟不至附紀貫號鏡池西上仲房僧也每悼祖庭荒落嘗拾娑羅果于阿育王塔下歸種山軒之前且祝曰此樹敷榮法門再振久之幹成尋丈因主金粟之請廷賓字客卿天啟甲子舉人嘗任鄞學博士後得法于密雲之子石奇通雲名行恂號退安住雪竇之妙高峯崇禎四年辛未萬工池朱藻藂生殿基前獅子柏復榮質實自萬曆丁亥洪水後池水汚葑柏枝枯瘁是年池生朱藻波光若錦柏亦漸還蒼翠兆本山中興之瑞焉是歲四月三日丙午密雲禪師圓悟繇阿育王山來主法席寺復為十方住持應郡司李新建海岸黃端伯鄉侍御李漸鴻遵徐心韋之垣及僧明貫佛金諸人申前請也崇禎五年壬申纂天童寺志正疏志凡五卷咨謀者張客卿草創者僧白山討潤者王金如管而抑鋟傳者陳紀常稱壬申志鄞令蘭陵芳洲王章序今夫一行作吏便縛俗緣即翻閱志林不離藤橛靈山非不咫尺未遑著屐探奇衣鉢縱有原頭誰向傳燈問派茫茫簿案幾於苦海無邊碌碌風塵竊願色身無礙憶昔育王寺征車暫憩因得密雲師棒喝指迷擊拂不過眼前直令通身汗透拈花即是了義何但劈面金針就此慈悲法門都關民社正印無何受請天童中興臨濟慨梵宇之歷劫半屬艸烟憫真諦之沉淪為傳薪火放下樵擔立成龍象莊嚴獨座法筵盡作鳥魚參聽發願時正如水銀撒地隨到皆圓卓錫處又如明月落川容光必映太白遺勝一稽圖而晉殿唐宮宛爾神游渡葦宗風一按譜而曹溪臨濟儼然未散猗歟盛哉莫作瞿曇內詮堪入古菫外紀余質慚下乘力遜布金原本山川徒羨青蓮仙蹟披觀寶筏聊於玉局效顰倘曰口頭禪和盤托出須提門外漢息念皈依固是密師普度弘功亦是弟子當官懺業時將入計因廣文請而為之序崇禎八年乙亥密雲禪師始建佛殿天王殿既而法堂先覺堂藏閣大方丈以次落成正疏佛殿為間者七其高九丈六尺縱十一丈廣十三丈五尺東掖則有伽藍堂西掖則有祖師室為楹各三天王殿為間及廣並如佛殿之數其高八丈六尺縱九十尺法堂間與廣同佛殿惟兩偏又各一楹六丈六尺者其高也八丈六尺者其縱也先覺堂為間三其高三丈縱五丈廣六丈左側有樓二間曰司香藏閣凡七間高四丈六尺縱七丈廣十又一丈大方丈凡三間兩偏為間各一高三丈六尺縱六丈六尺廣八丈二尺輔左右以樓曰刷印凡十間小方丈為樓凡三間兩偏各一間韋馱像僧朗契自維揚造成浮海而至悟禪師法堂銘法堂中主人公高陞座萬指叢無法說度朦朧惟直指棒頭通又先覺論先覺雖覺後覺後覺若不覺安知先覺之覺趣故因自覺而感先覺所謂後覺效先覺既因先覺以自覺復將斯覺以覺後覺之覺是則自覺覺他覺覺相承如燈然燈燈燈續燄先覺之義大矣哉又先覺堂碑記設造祖堂蓋因三因一因山僧從上來源中有天童華天童傑二祖故於育王來歸二祖塔詢舊住僧竟無知者二因天童請入院後徧禮傳燈所載本寺陞堂說法利生者不惟山屬他姓即塔已大半掘壞三因舊住房僧惟設遞代受度付產者為祖即宏智兒孫例如此故山僧發願自開山來凡開堂演法者咸設牌位同居此堂遇朔望時住持當炷香禮拜啟後人以了生死為心不可以產業為事即山僧設有兒孫并諸房僧非於本寺開堂者斷不可入此堂混雜先聖致不尊重獲罪法門願護法韋馱并伽藍神監悟本心初因如此是為記崇禎九年丙子建雲水堂於佛殿東偏其西偏建應供堂正疏雲水堂為間凡七左右為間各一應供堂如之是歲又建延壽堂於天王殿外之西正疏堂凡二十間初嘉禾錢大理士貴之子不知有天童者將亡之際忽云天童天童後復夢告曰我三年還來大理遂入山修供祈嗣因建是堂并藥物之需以安病僧未幾果得子額其堂曰有喜後錢公子芳標至山恍如再來捐移天王殿東崇禎十年丁丑建西禪堂及東西兩客堂正疏禪堂在藏閣前為間凡七高四丈六尺縱六丈六尺廣十一丈中設聖僧像東客堂在先覺堂垣南為間十一又七西客堂在小方丈垣南為間一十又八崇禎十三年庚辰建東禪堂及鐘樓又有堂曰新新閣曰廻光樓曰返照正疏禪堂在廻光閣東凡七間兩偏各一間高廣溢於西制中設初祖像鐘樓在佛殿東廊外高與天王殿等對峙欲建鼓樓已庀材鳩工矣以形家言中止新新堂在東禪堂後為間二十有二廻光閣踞天王殿東其西則返照樓為間各七並高五丈六尺自辛未至此凡十載間所建正宇外其他隨構者東西兩廊香積廚浴室樓有三曰庫司曰西客曰藥料寮有八曰首座曰頭首曰知客曰化主曰典座曰雜務曰什物曰浣濯房有十一曰碓曰磨曰茶曰小菜曰收飯曰磑曰田曰園曰柴曰頭口曰圊而諸構間器設具備正疏東西廊自下至上各長五十又五丈香積廚凡七間銅鍋有容二十餘石者有容數石者僧深密從金陵募鑄浴室在澗西凡四間庫司樓在西禪堂垣外為間者七西客樓在庫樓垣西為閣者三兩偏各一藥樓在西客樓右為間者二單寮凡一十九間在方丈後頭首寮凡十間在大方丈前知客寮凡三間兩偏各一間在佛殿西廡與東廡首座寮相對化主寮制如知客在法堂東廡典座寮凡三間在香積厨左偏雜務寮計三間兩偏各一間在法堂東偏什物浣濯二寮各二間一在知客寮右一在化主寮左落法堂西偏為間三左右偏各一者碓房也與典座寮對而為間三者磨房也落碓房左而為間二者茶房也而小菜房傍之與藥樓對而為間二者收飯房也磑房凡三間田房二間園房三間柴房頭口房圊房各四間俱臨西澗之濱又接西澗橋濬築內外萬工池造七塔正疏外池水先是從西澗來直瀉池面無旁殺者故勢多湍決因別為一澗引泉曲折出清關橋捍巨石又兩池各濬深數十尺工亦萬計池中獲古龍泉瓷鼎二上覆以鐘其一最佳者兩耳三足底有圜孔自足至耳高可尺五質同碧玉光采照人夫洪水之變瓦礎無一存者而此鼎潛淵無恙鍬钁不傷毫髮真神物也今供西禪堂其一藏庫樓者後遭燬江陰介子黃毓祺天童寺中興碑記晉義興行感太白人稱太白祖師因以名山唐法璿如之山又以天童稱天童之有寺也自乾元之清閒始天童之為十方禪剎也自大中之咸啟始其稱景德禪寺也則自宋景德始建炎末宏智覺撤而新之即三門為大閣安奉千佛又建盧舍那閣觀者如游華藏界而僧堂眾寮臥具飲食器所以處其徒者亦皆如寶坊化城又即濱海之隙障斥鹵而耕之以給僧供天童道場翕然稱中興焉嗣是屢燬屢建迨我明萬曆丁亥烈風雨龍出水漲寺遂圮今上崇禎辛未我密雲禪師應寺僧暨鄉紳請來主兹山龍象十千爭趨鎚拂越數載百廢具興視宏智覺所謂不起於座變荊棘林為梵釋龍天之宮者殆無以異門下士謀立碑石紀師中興功或難曰自有天童以來稱中興者惟宏智覺他如慈航樸建超諸有閣於盧舍那閣前複道聯屬巋然相望宋孝宗手書太白名山賜之虛菴敞致島夷百圍之木挾大舶泛鯨波而至傑閣頓為改觀下瞰河漢星斗如在欄檻別山智縛茅以居歲旱禱雨輒應人情大和會輪奐斬新視舊無一殺元明良重建朝元閣左鴻鐘右輪藏鑄萬銅佛置閣中梁棟雲飛柱石山積皆未聞有中興名今師所剙造修敞巨麗不及諸老千一其稱中興者何也且宏智覺時寺中有田萬三千畝四面山皆寺中山無他樵采者夾道古松二十里慈航樸大築海塗增益歲入元明良復萬佛莊田于牧峯鼈山二島嶼下若干頃有奇今寺僧斥賣殆盡師概置不問即山中祖塔祇存空穴者有之畧一修復未免曳杖渡江矣何中興之足云予笑曰此其所以為中興也宏智覺名徹九重化走八埏豈僅以天童樓閣甲于東南而已哉然則我師之所以稱中興者亦可例見師名圓悟宜興蔣氏子嗣龍池幻有傳溯曹溪為三十四世孫其持身也孤峻其唱道也直截意所不可飄飄然恥同蚖蛇戀窟其淵源有自謹拜手作記系之詞達磨西來曹源一滴臨濟宗風楊岐正脈惟應菴華暨密菴傑是父是子住持景德十七世孫天童繼席密雲彌布蔭覆一切手拈白棒攔腰劈脊直指諸人離心意識石火罔通電光莫及須彌搥碎崖崩石裂命根下刃無諸枝葉大用迥然全機獨脫辨魔揀異案據款結一任諸方來納敗闕同一虛空天地日月人何今古棒何勝劣個中誰主撲落無物見墮斷阬匠非本色博山雲門痛遭訶斥餘子紛紛一唾不值非其種草徒勞入室披師子皮噴野狐沫徧搜三法以為成式魔魅後昆贓誣先哲又或於中妄矜差別玄要自他分疆釘橛韶陽三句支離配合世智辨聰名運糞入老牛舐犢遮醜藏拙須知此老家風殊絕每歎古人門庭建立鑄印銷印毋固毋必臨濟自言三句即一皆是空名而無有實六十烏藤如蒿枝拂匪從檗來豈大愚力丈自耳聾檗自吐舌肯累馬師以喝為喝棒喝臨時猶如俊鶻兔起艸間生擒活擊扶破砂盆七穿八穴蛇頭揩癢虎口奪食應菴父子頂𩕳著楔盡底掀翻和盤托出大冶洪爐烹煅諸佛三賢十聖曝腮點額到處三拈賊刀殺賊棒頭有眼臨濟一隻宗祖高明兒孫烜赫偉哉中興勒詞紀石崇禎十四年辛巳重纂天童寺志正疏江陰黃介子毓祺所修凡十卷分為十志蓋藍本壬申志而稍廣之者參議槐庭林祖述宿天童寺詩鳥道逶迤入招提此勝遊斜陽千嶂夕玉露萬松秋法界寰中勝珠林望裏遒路從脩竹轉水向曲池流苔繡瞿曇古雲封寶座幽經幢閒白日臺殿沒荒丘絕頂龍湫見懸崖佛跡留溪聲疑卷壑霧氣欲沉樓午夜聞僧梵凉思浣客愁興衰都莫問天地總浮漚少宰栩菴林棟隆同李漸鴻侍御遊寺詩空王臺殿倚巃嵸九里長松一徑通曲水回環分日月危巒影亂隔玲瓏岫雲暗度千嵓桺海色晴連萬谷風勝友相尋多遠意歸依何日息心中博士客卿張廷賓入寺詩熏風六月自生凉獨入深山選佛場隨到便聞奇特事蟬聲竹影稻花香東坡玉版趙州茶昔日天童舊作家一自門庭蕭瑟後筍蒲隙地入官衙囊雲增德詩衰年差喜健著得草鞋行有足何愁溼尋山不必晴路非無處入雲卻此中生自嚮兹峯久到來惟雨聲冏卿塞翁謝三賓遊天童阿育王詩雲林來遠客老衲指名山百里皆梅竹孤雲自往還鐘聲青嶂外塔影翠微間舍利今何在山僧早閉關大行蒼郊徐家麟詩自懼雙眉鐘裏看得逢山色便為歡輕輿敵馬追危日濁酒臨風傲薄寒排對諸巖青未了飄零幾葉絳猶攢繇來我輩耽嘉勝恥不如僧語豈謾太常繭菴林時對詩萬峯攢翠到蓮臺碧瓦丹楹次第開雲幕重陰催宿雨谷鳴飛瀑度輕雷滿山松老龍生樹一路花香鳥印苔夜靜香飄垂暮靄數聲清梵隔塵埃國朝世祖順治四年丁亥費隱禪師通容恢復東谷清理南山歸還侵田三百餘畝如如居士檇李黃承昊天童興復東谷記天童固五山之一也自密老人中興濟道龍驤雷送而太白雄峯烺烺象表者遂乃越玉几凌霄南屏飛來諸勝而上之若稽古輿圖天童之初得名也以義興得地也以宏智始始之終終之或曰故非今景德寺址也景德自唐至德之曇總始也去寺址一里而遙曰東谷者其是也或曰小天童非古也嘗度清關去屐齒之前𢽽者戴松陰歷甃砌憑夷鎻翠之虛亭去古三門尚數十武緣魁陵而東澗流淙淙然摳衣涉之徙倚中峯之麓見所為畝首之犁然壞道之斑然或曰此古天童也童子汲侍胡然而天祕書多寶胡然而帝鄰虛析塵抑已難矣蓋中峯之障天童左臂者折而峙其右玄武童然蒼黃相摩彌望一如太白之巔其左層巒蔽虧木千章竹萬箇前峯低昂池水泱泱二區三唐其視端拱雙鏡外者如屏如幙森沉不讓雄秀曠衍弗逮也以王業例之將猶姬伯之邠岐劉叔之南陽乎視今梁麗輝暎飛甍盤鬱者而小之小之乎云爾或曰小天童非古也隰州古佛即其墟建窣堵波焉四方來觀者遂不以義興以宏智額曰妙光志帝錫也方建炎時南北初裂黔首日苦兵宏智禪師特顯正偏不犯之手談笑而起曹洞于未墜平高就下捨短從長釋梵龍天之宮美哉輪焉禪師善逝後五百歲非惟河橫斗轉黃閣之家信莫傳而窣堵之巋然僅存者化紺宇為荊榛夷香幢為井竈乃更在盛平之世雖以吾密老人眼定乾坤發揚蹈厲二十年來琳宮再造獅象圍繞藉第四正宗祖塔而一再曳杖出山又奚論妙光之荒支矣老人善逝後五六歲費隱禪師來主院事以較建炎間抑觭難矣乃大師獨從寒沙問烟塢不假聲色而掀翻老瓦盆照中用用中照幾令洞家鼻祖雪頂龎眉重開生面知音知後更誰知蓋濟洞之激揚家風舊矣方太師入院後徧謁祖塔而憑杖過東谷風饕雨虐衋然傷之作詩記感明年觀察孫公子秀大將軍張公杰參戎吳公岱並轡入天童問道固請所以效鞭驅者師首以東谷對三公色動亟屬鞬珥執戈以從者澒洞巖壑闢荊榛摧井竈草薙而禽獮之先是大將軍建牙蛟川嘗昏旦望紫氣從東起帳下士區指分野屬天童云至是宿山寺丙夜老僧見夢中癯而受食類冥游單棲者及至拜祖像注視久之猶戃怳疑夢中因相顧愕眙并心為師決匡復計孫公主定法吳公主財施請之太守太守曰善而調攝上下謀謨萬全吳公力居多焉問塔宇之刊落者幾何年矣影堂淪墟者何故之從也問鴈列于塔右者曰雲外岫禪師彼豶豕而啼雞者非元明良退老之故廬乎奈何日夕推換及此問荒碑之偃階戺者二宏智遺世偈及元明祭詞皆在焉問端居其下址南面如負扆者曰宋周益公撰塔銘其橫峙上方者則宏智自撰大用菴銘也文旨斐亹不具載往有居民擬操巨斧擊仆益公碑銘不中反中其首因病創死斷碣偃道左者徑二尺志香燈田數吳公得以其文按問諸侵蝕法產者田若干頃山若干隴又明年太守韋公克振主定法副總戎孫公世蔭主財施并按諸法產之飛灑未歸者田若干頃山若干隴於是太白之陰寶藏之林興璿之英七十二祖之鍾靈無復卷婁之垢藏甌窶之曼聲矣論者以為天童盛時鶴歸芝圃支龍赤光不見廣九隴非延袤也柯爛芭蕉江臯轉浪不見侈百畝非附益也夫何足為大師沾沾頌功予獨嘅夫濟洞之淵深雖云中原並驅然而流傳至今未敢稱昌昌之二桂也溯夫楊廣待價聖巖得鷹皮履叶帶奚慮今日哉余與大師幸忝同門之誼故不辭老病而為之記附紀是舉也諸當事施銀共三百二十兩為給贖田與屋價之費刊有定案順治十四年丁酉山翁禪師道忞建輾屋五間石輾二部初於西澗建水碓未成順治十六年己亥奉敕賜寺額曰弘法時山翁忞禪師應召奏對所請正疏帝問師天童二字何義師述其繇兼請寺額上乃賜弘法圓照真覺法慶諸額俾師自定因遵首二字師以詩記之詩曰名山希寵錫聖主尚勞謙兩字從高揭諸顏聽自拈瑤章侵玉漢天樂動危簷太白標弘法名同實共兼順治十七年庚子賜忞號弘覺禪師錫之敕印後馳驛歸山奉上發帑金千兩遵修殿宇是歲遠菴禪師本㒥建知浴寮三間禪堂前廊宇一帶募砌兩廊天王殿磚石又補植松行自鎖翠亭至古山門住山本㒥詩栽得靈柯作大陰當知不是等閑心先從種上搜求異從壽昌菊兄施種還向根邊培植深初喜森森青覆草終思鬱鬱翠成林月明遙見歸巢鶴雪操何時到白尋鏡碧柴昌銘詩夾道蒼憶昔年無多秋影瘦于前竹闌曲護新栽地龍性他時不讓天又見永康童子在因知泉石主人賢著書歲月何難就一片蟬聲亂夕烟今上康熙七年戊申弘覺禪師建奎煥樓正疏樓凡五間在法堂之東敬奉世祖章皇帝所賜藥師佛關帝諸像恭藏宸翰書畫及懸御筆額聯詳見盛典考康熙八年己酉邑令海陵張侯幼學歸大鑑堂古額幼學自記達磨六傳而至曹溪圓寂之後諡曰大監以表祖之道眼圜明洞然無遺照焉明金華宋浦江公濂顏天童之方丈曰大監蓋以誌六祖之宗風於兹再振也數百年來興廢不一流失在城市中且為兵厮所有幾斧斯為薪矣會苾蒭沐峯見之驚告余曰此先賢遺蹟天童數百年物也亟收取之遲則無及余如教遣胥馳索遂得歸余署銀鈎鐵畫對而起敬者久之夫斯文之墜地在人莫不有天意焉六祖傳燈以後至元末宗風寖微而天童獨豎鉗錘遮前絕後天下靡然向風宋儒闡明理學後人反以誠意正心為嚆矢此道幾乎息矣明初宋公以耆舊受徵聘以理佐治平遂為一代儒者之宗宋公謂不傳之心印非天童無與歸故以大監顏其方丈是以遠禰六祖許之也既失不可復得而不自意珠回璧轉纖毫無損若有鬼神呵護之者其所關于天童輕重大矣豈特太原之亡簪江漢之墜履哉是役也沐峯之功不可泯焉遂為記而歸之附紀案字通鑑鑒相同而監又與鑑鑒相通周書人無于水監當于民監詩小雅既立之監又云監亦有光六書正譌以鏡照人曰監此宋文憲書大鑑為監也康熙十四年乙卯郡別駕郭公一鳳施法寶全藏文林梅槎洪圖光記通府郭公皈誠佛教以利濟為懷向官江右道涉鄱陽忽際怒風波濤山立楫摧檣傾者前後相望矣公焚香祝曰若假弘慈卸兹恐怖願請藏經施寺聿成勝果香烟所指遂得浮嶼障蔽狂飇布颿無恙於是捐貲八百餘緡用酬心祝楮札堅好題躞致工以卷計六千七百一十七以函計六百七十八以櫝計一十有二如波斯入海得珊瑚寶樹晃耀奪目見未曾有然非璢璃淨瓶莫成位置故思一精舍貯經未有地也已而量移來寧朞年間政通人和公餘多暇入叩天童時主天童者歗堂山公同登經閣見層楯雲承飛甍霞燦而所藏經卷不稱傑構慨然曰某購藏經貯未有所今登斯閣若協夙契乃載自虎林供奉入山時道俗瞻仰香花夾路函櫝莊嚴人天歡喜遂令名山勝地增飾大觀因念密祖創復天童海內全盛布金長者接迹而至似已豫知嗣法有人宗風遠扇機緣所會後先同揆是以不嫌其闕留待今兹嗟乎方今燐燹偪爾鄱陽觸目郭公意欲仰藉經力永鎮南土息大地之風波伏人間之鯨鱷俾蒼生赤子共上慈航草木禽魚咸登彼岸豈若世人施舍祈一門之福利己哉公致經日圖光幸陪侍入山與觀厥盛因攬筆記石期附不朽公名一鳳號九苞由歲進士江南六合籍金州人康熙十五年丙辰山曉禪師本皙集寶積錄於大鑑堂後名其處曰寶積堂正疏錄凡九十三卷附敦本崇正錄一卷授梓康熙十八年己未皙禪師建御碑亭於奎煥樓後正疏亭內樹碑四座一鐫世祖章皇帝賜弘覺禪師敕書手詔三鐫御書敬佛春城梵網經卷康熙壬子嘉平月臣僧道忞謹跋云世祖章皇帝生同虞舜入統中華當幼冲之年為百神之主埽蕩欃槍平清寰宇又復多能天縱既貫通儒之學更窮釋氏之宗以至池臨晉帖畫彷元人莫不汲幽造玄深臻大妙於乎非位登五地現御金輪何以能此歲在己亥爰下天書召忞入京問道禮遇之隆邁前安秀洎忞力請還山不忍遠別乃留門人月皙二子開法隆安善果俾見源源庶慰遐思故或陪宸萬善或賜餐大內或奉御景山或駕臨二寺稱師兄而不名樂快談而無諱由是諭免僧眾禮拜闕庭親灑宸翰為書此卷信乎我皇真面稟靈山而不忘屬累者也今康熙壬子皙主天童畏掩天章孤上慈德出授良工壽石奉為我法萬世金湯忞拜手颺言恭述因緣左方用彰奎璧至若銀鈎鐵畫出入歐虞則自有通人坐臥其下三日而不能去者康熙十九年庚申皙禪師建古山門正疏舊在金莊橋邊今進二十餘步捐貲者戎銓部上德補太白名山額者胡孝廉德邁是歲又建法堂後東廊一帶及增建輾屋三間并修柴圊諸房砌法堂前晒經臺石康熙二十一年壬戌仲冬庫司樓災皙禪師重建增高舊式五尺康熙二十二年癸亥皙禪師重修殿堂增建兩楹過道護以欄楯郡侯李公煦首施俸資嘯堂本皙疏引四明太白山之有天童寺自西晉永康庚申迄今康熙壬戌閱年一千四百矣其閒更建置百十有二而吾祖密雲先老和尚為今寺之開剏歷朝賜額者三而先師山翁老人荷世祖召入內廷問道啟法賜號為弘覺禪師賜額曰弘法禪寺又詔俞密祖語錄入大藏於是開創繼述之功並顯焉溯殿堂之建迄今亦四十又八年矣當時一木片瓦皆密祖心籌而目遴堅壯縝塓自足垂之永久但歷年半百山風鼓雪積作層冰山露凝霜復經綿雨雖金石猶然銷泐况土木之質時傷日損月破歲殘一鱗有罅漸引漏痕涓滴相沿寸椽交病深念修葺之萬無可緩轉思經營之費不貲在山衲則心心祇為祖庭且以肅承先皇帝敬佛之睿意敢辭艱瘁于牢蘭海內大檀護乃人人盡是菩薩更以推重此名山報國之叢林必投多寶于陀衞鉢中昔王含作寺錢不足而獲三利之寶珠所謂二梵之福獨歸補理故寺者良有以也是歲又濬築外萬工池侍讀藻如王掞記易以木上有水為井其養而不窮者不在初六之井泥在上六之勿幕勞民勸相端有在已崑崙為帝之下都面有九井周禮挈壺氏兢兢於軍井之司素綆銀牀古人每重言之耿恭疎勒泉源坌涌其驚神應若西域八功德水高僧能移致梵剎大率精誠所格必有靈異之徵并受其福而在釋氏尤著寧波太白山天童寺晉義興禪師道場也咸啟之後代著禪宗密雲悟祖更以青蓮妙果起廢振墜遠續薪傳其山孤峙海濱大雲小白秀出天半考天童舊志有日月兩池歲久湮塞密祖重濬之後以受西澗之水沙石衝激易為壅塞山曉和上時欲疏鑿而未果數十年來未竟之緒而嗣法弟子淨雲自可兩公願為勸募得石門遠思曹先生家人輩暨四方善信揮金相助以全山公之願淨雲為名家冢婦夏考功孤忠亮節垂聲峰泖令嗣存古偕婦翁錢職方並罹黨禍淨雲悼門戶之衰零念浮生之泡影皈禮空王精心淨觀其識力高遠殆過人百倍余覽曉和上奏對錄參究宗旨至尊欽仰一衣一鉢諒非輕授淨雲以閨房之秀領袖法嗣其心契者不已深乎夫羣生之溺苦海久矣金乘珠藏洒楊枝之一滴登于彼岸淨雲弘無上願力俾靈山一會之眾咸飫瓊漿斯固上六之勿幕非若初六之井泥也余聞節義之家類多龍象之侶諸行事為上帝所默相井養不窮宜其還至而立效已夫利濟之澤普及法侶是德施之廣也功行既滿俾密祖始願快然無憾是承前之誼也聿旗問水之間雙池并列直與鬱林司命各著奇觀是法門之勝蹟也蓋一舉而三善備焉余曏者選士浙水兩至甬東竟不獲一登太白聞淨雲之事恍置身于二十里松之內遂因其請而記之又重建中峰菴并疊秀軒正疏屋凡十有一間中奉密菴傑禪師像以其塔相近也宋時原有菴軒今增置天然閣三閒附昔夢堂噩禪師曾著有中峯菴疊秀軒賦湮沒無聞只存殘碣聞性道補曰領扶輿之旁礴兮循天作以獨崇氣漻漻而骨厈厈兮抗孤潔以自沖動星垣而下河漢兮蘿薜為之垂鬉飲沆瀣而衣松柏兮烟霞結以成墉溯瀚海之東南兮峙太白之巃嵸衍青鳳之廻翔兮蜿蜒亙于蒼龍面盤嶂而背盂巒兮輔東谷而弼玲瓏羣然俯首以聽命兮儼羅拜而肅恭插碧霄而通紫極兮惟一峯之得中當沙盆之未破兮泉瀁月而彌縫驚沙盆之忽破兮泉月漏而難𠑽系臨濟之十四世兮傳天童之正宗豎窣堵于山阿兮曰密菴傑之幻封架軒軒以疉秀兮老噩賦就而精工跋清容而服膺兮書漢隸而碑礱問菴中其誰寓兮寄左菴之芳叢及朽木之來訪兮仰無傳孠之高風遭亢龍之有悔兮汎洪水之洶洶蕩木石而靡遺兮鞠蔓艸之茸茸布密雲而施法雨兮開闢重見于鴻濛橫一棒以振四海兮構浮空之梵宮得善繼之喆嗣兮號弘覺曰山翁補天缺而奠地維兮藉兩住以帡幪接善述之令子兮跨東林之遠公劺十載之經營兮道峻勛鴻友宗雷而契陶陸兮今更聚石于芝峯山再曉而日杲兮舒嘯堂之雍容繇天闕旋而地靈協兮轉層巘之鬱蔥體苦心而度艱遇兮扶破盆而薪紅緇素傾願以競歸兮望道德之如嵩乘清暇而禪文字兮凌石門而稱雄觀其雅度如秋兮嚴律如冬擔寒梅之瀟灑堅古柏之髼鬆潺潺兮於菟跑流之利澤款款兮宿鷺盟締以心同懷祖烈兮埽苔痕之絕壁隨步趨兮每尋勝于孤笻豫占吉壤兮箕效良弓神凝氣結兮性靜心融五色斑斕于香土千華璀璨于高谼障朝霞兮暐暐縣夜月兮溶溶鹿甡甡而求友雉簉簉以相從等峩眉于天半削紫翠之芙蓉象王呈牙于白石神猊遙吼于青蓬鎖翠披瓔珞之委委兮清關激佩玉之淙淙敕鼇柱兮擎今時之寶塔揮鯨鬣兮鳴他日之金鐘染烟老竹譯韻孤桐陳言濫齒兮慚續貂于無夢醜畫汚眸兮愧學𧓒于雕蟲中翰戢齋徐勍中峯詩天放吾曹歲月閒相攜衝冷過東山疎鐘出谷迎人遠古佛同龕笑客顏撥火連宵吟小閣聽泉長日坐清關此遊似覺晴光好踏徧芒鞋未欲還孝廉恕齋謝為憲詩白雲深處倚枯笻謖謖風生百尺松一髮青山長不改路人遙指是中峯芙蓉削就裊烟鬟嵓壑山陰似此閒一徑逶迤精舍靜藤蘿未許俗人攀進士鄂山張起宗詩築室幽棲青鳳山路盤石磴共追攀看雲變幻仍歸岫待月𤫩瓏勿閉關三徑野花何用植萬竿脩竹不須刪我來初就蒲團坐便欲留連未忍還又疊秀軒詩隙地誅茅翠可捫小軒閑處倚雲根鉢囊挂壁松枝老麈尾橫琴竹榻溫鳥語花香閑白晝山光潭影靜黃昬何緣得到維摩室一破蒼苔屐齒痕中翰鹿亭胡德邁詩遺蹟中峯在誅茅勝地賖寒烟和樹直脩竹背山斜客至燒新茗詩成見晚霞老僧頻指點幾處種梅花聞鐘知寺近數武即清關別業中峯老遊人太白還鑿泉成碧沼閉戶有青山不是方袍客誰來此地閒鳧巖徐志泰詩誅茅編柵傍山斜疊秀新成景最嘉滿地仍留僧種竹四簷重憶鳥啼花到窗雲影隨風澹出谷溪聲帶雨賖投老不須開法席一瓶一鉢是生涯康熙二十三年甲子皙禪師重建東谷菴并重建普同塔院康熙二十四年乙丑又修密祖南山塔院重裝祖像外建石橋名曰大僧并造肅敬亭康熙二十五年丙寅刊立重興寺碑司農蜀遂李仙根重興寺記略天童自義興以來建幢繼席雷無歇響炬列長紅蓋亦徧世界妙嚴闡化選佛之場未有繩繩奕奕若斯之盛矣迦文舍利出太康之三年至義興開山纔十九年則是佛出八萬四千之一以鎮曜南天而義師即以全身福慧光啟山靈鶯鳴谷應符證明確宜其為金庭英藪莫可比也自唐宋及元明屢有興替皆圖維締構往往廢不久而即復蓋天人合發不使少有墜湮若此萬曆丁亥秋忽值龍怒風雨驟臻傾蕩就盡四十餘年莫克維新夫以山之名勝如彼歷世諸天人鬼之所瞻護如此一龍也昔以仁今以暴昔可以化馴而今獨以怒逞哉天下之廢興一也有小廢也則小興欲其大興也則必有大廢龍之為物至神夫固知法王再造之有屬矣崇禎戊辰迎密雲悟禪師於金粟未果行又三年傾企申請乃至當是時一壑荊榛崇丘敗甓耳師乃不惜肝腦觸機披瀝運正法味應眾飢渴頓令緇素雲集財力輻合自入山三年稍有建置後以海舶致材于閩者再於乙亥歲成天人師殿次天王殿及法堂大小方丈其餘堂則有先覺雲水新新東禪西禪東客西客應供延壽樓閣之大者則藏經回光返照鐘及庫司外復有小者三至于廊寮房室凡有名者二十有三以次建置焉其激于池者殺之衝于溜者隄之艱于渡者橋之塔廟表之江埠院之山場莊業茶亭松關無一非師隨意擘畫以成者也若夫摶土刻木範金施繪瑞光備現于鬼斧神工猗歟百千萬祀之佛海哉師以壬午秋示寂所付嗣十二人繼住者木陳忞費隱容林野奇牧雲門浮石賢順治丙申忞公重應住持己亥蒙世祖章皇帝欽召稱旨錫號弘覺禪師而悟公語錄俞入大藏恩賜倍隆洵希世之遇也忞公去付弟子遠菴㒥公一紀付山曉皙公公固昔所侍應召追隨禁廷者也公承師志殫輯寶積諸錄復綢繆堂構繼述可謂善矣兹皙公以寺重興未有備記屬之仙根根曰夫佛法上等事以智慧波羅蜜照破一切虛妄名相而行願回向則又取夫廣修供養隨喜功德有漏無漏何以殊焉當義興之初啟東谷也一把茅內清風明月何輪奐丹碧之有哉然而金繩甘露青豆赤華已不可謂非彌滿山谷照爍古今矣至宏智覺禪師于一年所能致層樓傑閣標奇聳觀以今况之不更遜乎若夫華嚴會上佛于默然趺座中現種種光于一光中現種種國土菩薩宮殿寶座香花雲網音樂飲饌圍繞咸讚其為人天福報所不能及其億萬之一者又當何如而以興造名藍于門百堵遂謂不朽勝事度亦悟禪師所不屑也雖然予又嘗思之矣諸佛菩薩于一切有無際莫不截斷惟眾生不能斷非不能斷實不可斷亦不必斷也眾生由六根而迷亦由六根而悟莊嚴色相六根之所寄也當其迷之之時而與之語某時有佛光有種種饒樂鮮不疑也即其有志向上者而與之語倚嵓傍枯焚頂截臂可以直超玄要恐不盡然也今試使建一剎于此而能令人見所未見聞所未聞又見所真見聞所真聞喜于心動于目舞蹈于手足泛葦航而不懼步林麓而傾誠至或剪除葛絮直探慧日或鐘魚梵唄悽切心脾甚至進退坐臥耕芸工作熙熙雍雍如三代禮樂頭頭皆是而又使富貴利達聰明才辨之士俯首調伏望慈月而生清凉而市井山林童叟鄙樸貧餓不能自生滑黠不可馴制者亦知發蒙易轍戀命趨福則是莊嚴色相之所成就如是謂之有漏乎無漏乎由是而知舍利之出太白之下諸大禪師之所拮据不懈至烈于火敗于水除其舊而兆其新者孰非以此故哉予是以與皙公更有望于後之作者觀察琅槐杜漺游寺詩古寺遶長烟隔嶺見蒼莽松杉如比屋更出羣峯上山僧導我前楖栗一條杖云令龍象伏斯言何洸漭天荒破義興密公更雄長妙音胡寂然使我失瞻仰風雨宿山房夜聞鐘磬響忽洗百年愁琉璃見精爽皓月忽一輪林杪寄真賞參差佛閣倚流泉太白峯高直上天十丈蓮中開士偈三生石上化人緣今聞啞女稱維衞始信天親是普賢風雨滿龕塵夢曉雲中一指示兜綿郡守菴崔維雅詩久隨綠水青山夢未試長松一塊濤出郭江聲如有約入峯霞氣已全高欣逢僧象持金地恭覩天章捧玉毫願與斯民同樂土春風春雨滿林臯邑令曉菴張幼學天童道上詩山灣綠水曲每曲總成幽漁網時驚鹿田歌閒叱牛廻環穿碧樹迢遞上紅樓早晚辨彭澤來從慧遠遊又和杜海憲韻九廻松壑響幽泉豈獨丹山是洞天流覽個中窺眾地登臨無盡絕諸緣璽書如見先皇帝几杖猶傳古聖賢一宿翠微清夢遠滿林風雨竹綿綿侍御道南胡文學詩條風扇將莫萋萋蔚平楚夾岸春色多鶯花燦香籞名剎隱龍象冥參相期許但為趙州茶不求嬾殘芋欽兹南禪風克纘西來緒泥金煥璿題奎文夜光吐眷懷溪山深披襟道力鉅探幽有舊要回尋讀書墅蟄菴錢光繡詩十里松陰映碧蘿雲開梵剎迥嵳峩擔𧚌黃葉歸茶竈簷引清泉入飯鍋曉霧出林迷洞壑寒飇到峽響山阿大千一粟堪成供給侍無勞童子過希周余洽詩纔入名山耳目奇眾峯拱立白雲歸客投深院心都靜僧在上方茶正馡世事只緣多一我法身原自少諸非此間了義皆經濟坐聽鐘聲度翠微御三沈延統詩名山紛我思良儔快容與陶然寄扁舟春波正清楚取次遵東臯喬松暗林籞古剎肇永康山房杳深許時坐清關橋泉聲理幽緒嵓石玲瓏帝座若逼處松竹點笙磬苾蒭一披叙溪風山雨至輕寒襲纖縷二見周容同竹窗夜入山詩山程半日脚寒谷易昏黃緩步淹同侶回首烟蒼茫鳴澗為我西歸雲為我傍松行逼天窄聚此沙路光適興愜寂寞隨遇成徜徉但聞竹杖聲不覺人語忘門遙一炬碧路轉殘磬長幽事寧易得人生自匆忙夙約試新茶又失看紅樹私念行就衰苦為塵事沍兹行舟楫餘過嶺客暇豫危橋聽鴻來短策看雲駐峯會暝色疑天陰落日悞但得此心酬何須歎遲暮翻如意外來忽爾空堂聚隔簾聞雨聲隨客先後步覺菴邵似歐詩太白山上雲接天太白山下水平川蛟龍窟宅不可近時時烟霧相糾纏我聞此中隱君子芒屩蘿衣心似水偶挈笻杖撥雲行行人邂逅青山裏相逢誰識是仙人道是青山未出塵今日不知何處去風風雨雨一山春蓉嶼張瑤芝詩嘯傲烟霞夙有緣又同老友問諸天幽禽盡日啼青嶂靈沼千秋湧白蓮點筆漫裁康樂賦焚香徐叩遠公禪山僧招我相茶話明月清風不敢眠礐樵李文纘詩吾師息念二林中寂坐山堂佛影通去亦偶然辭百丈留無不可為蘇公時留遠公復住頻年夢寄高嵓到此夜鐘聞半偈空倘許禪坊依澗下石梁終日聽松風梅谷張鴻儒詩三十年前快此行今來猶覺一笻輕松杉已改當年相丘壑還知昔日情雲為留人時近袂雨因愛客忽收晴故人若曉吾將至亭畔先教埽徑迎證山周斯盛詩雅性愛山水往往值歲晏昨歲入梅峯側徑逢微霰兹亦三度遊草草媿未徧寒風招我來霜清松色善層嵐起復收褰裳試登踐木脫鳥無聲怪石開生面高呼謝參軍揮手不可見吁嗟古與今忽忽如流電嶺雲獨無心深烟結片片二見張鸎詩石壁凌雲出祇林傍日開入門聞梵語說法有瑤臺樓倚千峯仄天空獨鶴來高僧知愛客豫使埽蒼苔貢士石枰潘訪岳詩同人來鹿苑塵累頓然空深谷忘諸相雙池映萬工蜜脾嘗品異高足和詩同竟日談無厭山花處處紅十笏通幽徑扶笻入翠微臥憑流汩汩坐聽說非非舌吐青蓮艶歌成白雪稀徘徊天欲暝雲氣擁禪闈缶堂董道權詩松關深處與雲齊遙憶同人此杖藜庭柏忽垂師有約山樓無恙客分題不成獨行逃蓮社已讓諸公笑虎溪為寄傳燈居士語年來應解聽黃鸝蟄菴有約未得入山東臯丘玉詩繩牀靜夜集幽虛茗碗蕭蕭坐論餘放志莫隨霄鶴去閑心且逐海鷗居看山此日依黃葉結社何年種白蕖豈待尚平婚嫁畢息懷先擬事匡廬章溪余浱詩秋末寒楓葉滿江莫攜瓢史上吳艭九年仍作空桑舍一鉢還依太白幢深樹花飛宵麈落乍廻雲臥曉鐘撞晤言此日成千載但向林公意自降雙水陸鋆次先方伯公韻詩路轉峯廻豁眼新上方臺殿近星辰龍歸絕頂參常到塔湧奇香散自頻陰壑慣飛經宿雨老梅先發隔年春塵蹤縛我緣何事欲向祇林證夙因鶴亭陳可先入山詩太白峯頭好住家青山層疊鎖烟霞雲橫古寺龍歸鉢日麗珠宮鹿獻花滿徑松肪堪釀酒懸崖石乳恰宜茶我來不用天童供占得清幽興倍賖西溪萬斯備詩依石寒烟覆碧蕪松陰欵欵杖藜扶空山更聽新桐葉舊社猶餐老䅽蒲雲外暫隨鶴共返嵓頭仍聚石為徒夜來法鼓重傳罷還似舟廻渡口無二見胡德邁同友夜入詩松關迢遞竹輿輕又傍雲嵐薄暮行一徑初交寒月影千山遙落晚鐘聲鳥依疎樹高還見人在微烟遠尚明漸有燈從嵓際出林閒知是老僧迎影巖林樾詩天光垂夏首奇雲垂蘿戶拂拂生清輝每自松閒吐山轉出寺門斜陽捲宿雨攜杖歷山隅曠然見太古愛山不住山未盡知山勝住山能愛山豈使山容賸眷懷愛山人遠霞與之暎曲徑獨徘徊忽來一聲磬過雨山無定翻疑近不青路方通野屋樹忽掩茅亭領略神能接盤桓足自停水聲今古一曾許幾人聽二見徐志泰詩山禽作春聲夢中喚我起曲澗散朝霞古池明積水巍巍太白峯當殿若環峙眾山雖迢遙差詩兒孫比緩步躋崇階大觀信觀止山寒雲滿樓松暗烟生几鳥飛綠嶂中僧老幽篁裏但已離喧囂便得脫泥滓忠育史在稷天童道上詩雲飛何處是玲瓏小白山連太白峯兩月春花香野岸一灣溪水繞寒松烟迷隔嶺疑無路樹密前村聽有鐘行到清關橋半里老僧石磴坐從容湘谿本圜入山詩縹緲羣巒列翠遙玲瓏終日對雲霄石蘿風露寒千葉斗氣春陰覆一橋花散梵宮人捉麈鐘傳齋閣客𠼫瓢白椎想見豐干舌烟霧蒼茫捲落潮蠡齋超寤阻雪別諸公詩入山凡七日五日雪相續梅花生肥香草芽壓纖綠萬境寂無聲雲中鳴一鵠心醉目亦飽短筇出山腹晨光錦鏡開前溪露茅屋去路不愁多山山踏寒玉康熙三十四年乙亥經藏閣燬于火四十年辛巳天嶽禪師本晝重修佛殿四十二年癸未欽賜名香清梵匾額等件到山臣僧本晝嵩呼膜拜之餘復獻鄙言一律恭謝聖恩此生冰檗一頭陀謬忝恩光注薜蘿渴驥凌風來魏闕怒猊銜澤瀉天河漢宮桃豈仙瓜並劫石心同玉硯磨更祝吾皇天共老永為法社障頹波鄞令御六王居中恭賫御題匾額赴山紀贈詩色相全空不染塵蒼松手植徧龍鱗袈裟舊賜藏金閣寶墨新題降紫宸杯渡錢塘傳舜孝錫飛太白頌堯仁名山此日祥光覆喜得攀雲禮上真二見張起宗同王明府送御題匾額恭紀集唐詩鸞鳳旌旗拂曉陳山川歷歷在清晨瓊臺含霧星辰滿霄漢無雲日月真賜額御書金字貴垂軒弱柳萬條新曾於太白峯前住八部同瞻一佛身王維張九齡李白王建王建趙彥昭白居易廣宣五色如絲下碧空眾香天上梵仙宮石潭倒映蓮花水幽谷時聞虎嘯風未捲翠簾朱閣上捧將堯日慶雲中一千龍象隨高步共識皇恩造化同許渾武元衡錢起韋應物許渾王建裴休張說四十五年丙戌偉載禪師元乘重建經藏閣并修戢南山塔院諸寮室四十七年戊子化士實慧募砌入山石路一十五里恒如善來同為募助五十二年請梵本經一藏住山超乘自記密雲悟祖中興天童殿堂樓閣巍然畢備惟藏經樓忽遭燬基生荒草經廢梵本遂闕焉十載未能頓復前功乘于康熙四十四年乙酉春繼住此山時有北京內務府張公諱萬鵬者知此山凡海內學道之士納之廣而非泛至之遠而非外謂此三藏法寶之樓豈若虛設乎塵積之函外壯其連雲之棟徒招凡跡以登臨致流光之唐喪者可任其廢久而不舉耶乃慨然捐金俾得鳩工再建未及期年即告成并新請三藏安置其上閣七間高五丈餘深五十尺橫百尺中立大悲懺法之壇龕几幡蓋莊嚴悉稱由是夕燈達晨晨香接夕千僧閱習遂無虛日此藏也此閣也因一廢而復舉一缺而愈備皆張公偕其夫人不待勸施募與而獨賴其成之易且速也公由工部郎加一品服誥命夫人王氏法名傳髻能手書法華全帙歸于閣今癸巳三月逢聖壽恭祝又捐金重飾大殿金相三軀飯僧圓藏作熏脩法事此特夫人與子鼎升鼎彝等必于名山禪剎共竭報上之誠正大異乎庸愚之私邀福己者名山之光由斯一念同日以增年祝萬年欲無盡期矣故悉記其一門功德真信三寶之標榜立于石太白山十景詩元乘深徑廻松開青闢翠兩行松夏續春陰雪斷冬未見梵天樓閣露深深先有出雲鐘清關噴雪最宜雨後看清關百道泉歸一噴間滾滾雪濤翻不盡大開龍口響空山雙池印景池清外內合胸襟容得千峯倒插深蕩月磨風如鏡裏從無痕迹著浮沉西磵分鐘鉢盂峯下落匆匆溪竹交加曲轉東聽得滿山風雨夜鐘聲又在月明中玲瓏天鑿西嵓高豁有窗軒雲見真根水見源臥雪膽寒離夜虎攀藤臂斷墮秋猿太白生雲晴時為淡雨為濃村外先占此一峯我只在山看畫法妙於染處藹重重東谷秋紅太白山中東谷秋夕陽紅樹晚雲樓好春別有霜天外早是梅花接上頭南山晚翠南山翠拱北峯寒覿面招呼向晚看流水隔橋春尚在竹扶松老萬千竿平臺鋪月月光鋪滿一臺平皎皎黃昏到五更何處不逢山夜好對人無此十分明鳳岡修竹青鳳岡頭日日來黃鸝囀處坐青苔好風引入天然閣竹下春蘭秋又開康熙五十三年重葺外山門又重飾大佛像三軀并羅漢像乾隆二十一年丙子法堂燬於火嘉慶十六年辛未敏菴禪師法堂重建主席方丈兼修餘屋
