body:
  text: 山川考太白山又名天童山在浙江寧波府鄞縣之東其鄉曰陽堂里曰太白距城而遙者六十里從正宋羅參軍濬寶慶四明志太白天童分為二山其圖上下遠裂元袁學士桷延祐志王總管元恭至正續志明永樂鈔志黃憲副潤玉簡要志楊外翰寔成化志張大司馬時徹嘉靖志皆分兩山㳂濬志也今山本合體名難岐指濬家廬陵未經躳歷筆屬傅會惟一山二名為定論山之名始晉義興師結茅此山感太白星幻為童子日供薪水遂以太白稱師并以名山又唐法禪師日虔誦法華經亦感天童進供故又以天童名尚論考義師結茅之歲正孝惠之太子遭毒賈后之年晉書云凡五星盈縮失位其精降于地為人太白降為壯夫處于林麓兹以壯變少執有道者之役太史失于占奏耳山之本自天台摘星峰來歷四明奉化諸山起金峩大梅循屈而結太白山之支從東而起者曰雲峰曰明角衍為盤山繇盤山折而北稍伏度太白嶺更起為大雲山落大雲而復聳者曰東峰闢其下為東谷即古天童也復起一峰曰乳折而東北峙者曰中峰繇此逶迤頓伏卸為高原而梵剎今奠於斯峰之著者凡六一曰太白峰在山之絕頂雄尊深秀為一郡之望每風雨時雷電多從頂出宋龍圖懶堂舒亶詩千峯下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲明密雲和尚圓悟偈昔人錯露個消息惹得人傳太白峯今我直豋峯頂上那來名字挂虛空泡園汪樞詩太白倚雲端凌霄幾百盤幽禽啼蜀帝喬木挺秦官鳥道青蘿滑龍湫白日寒兒孫羅立處一望失巑岏國朝費隱通容偈此時日月晉時天太白名高布大千海濶天空懷抱放把筇指點萬山川又峰曰鉢盂圓秀特起狀如覆鉢障於寺後明白川楊明詩太白聳奇峯宛然類僧鉢肖形天地初爐火幾滅沒淨水不可持降龍亦虛說留與登高人倚雲觀海月國朝五磊拙巖期懷詩團圞蒼翠暎穹窿名字誰安應量同縱使德山全妙用難教托向法堂中又有中峰左東谷右太白巍然萬山中故名又名曰青鳳者因愚谷禪師埽密菴塔偈有青鳳山前古澗邊之句也明東閒居士張嘉慶詩孤空容鶴夢來作片雲觀絕壑晴猶雨高峯午尚寒豈知青鳳影只在碧霄端為笑投閒客相期借一竿又有峰曰聿旂陡峻驚揚勢如旂展更有二峰曰東曰乳東峰在中峰之東乳以形肖在東谷後明雪竇石奇通雲聿旂峯偈莫作人間布影看聿旂峯聳石頭寒相逢若便知消息豈用人呼倒剎竿住山林野通奇東乳二峯詩一峯霜外立溪東為送歸人指顧中可是東峯疑未定樵人說是案山蓬千丈嵓頭雪未鎔幾囘清夢欲相從偶來東谷尋遺跡又見雲泉滴乳峯崖之顯者曰祖印在寺西北明梅菴如用詩隱映凉飇蒼翠冷白花古壁暮雲浮多言祖印重崖上空使猿猱泣露愁巖之奇者曰𤫩瓏峙寺西南循磴而上可二里許傾崖反捍怪石臨危若墜復倚其上多石窗嵓竇如蠭房螘穴外峭中空𠊓穿欹入錯落猶纍疉然其絕頂倏突倏平古樹野藤雲巒相抗宋鄞令荊國王安石經遊記略慶曆七年十一月丁丑余自縣山屬民使浚渠川甲申遊天童山宿景德寺質明與其長老瑞新上石望玲瓏嵓須猿吟者久之而還食寺之西堂遂行再見舒亶詩詭形迥與萬山殊空洞繇來一物無直恐虛心自天意人間穿鑿枉工夫長溪晞髮謝翱詩埀雲起嶔嵌衣被松與桂夜合量斗光隱若金石氣雨來輒阻之不得撫蒼翠下有桑門子飲用陶匏器盆中蓄海石左顧如牡蠣疑此磧上來不知幾年歲桑門却問客所居何姓氏回指南海峯蒼茫倘一至此雨飲嵓下作明二見楊明詩西崖千仞凌蒼穹有嵓突出高玲瓏朝霞遠暎赤瑪瑙秋露澹洗青芙蓉朔風一夜吹寒雪化作璇瑤更奇絕老衲開軒靜對餘試取冰花煮團月儀部緯真屠隆詩嵓前老樹挂枯藤辟穀仙人苦行僧四壁秋蛩霜外杵一牀黃葉雨中燈嵓上訪禪作雲門雪嶠圓信歌玲瓏嵓在何許相去天童寺之西曳杖出門青鳥啼萬工池外藤蘿低初一轉怪石橫斜見虎蹄春風隨我上山梯漸見危嵓左右來壘落雲根烟淒淒行不上脚跟疲酸澀芒鞵路欲迷樹下立數行雞人聲嚷嚷喧鼓鼙狹石縫如一綫挨身過去同猿雛幾人笑難扳躋有詩在手無筆題再一轉身心却與山水齊指點村田雙眼疎又一轉路上行人若游魚長松短竹紛萋萋石平如掌好攤書歸去罷踏爛泥高高低低氣力無嵓洞水聲不可坐渾身汗下難支吾好了眼睛苦了脚者樣遊山且躊躇到得平坡如到家縣崖千丈林花迃臥菴牧雲通門詩山洞何時鑿嵓崖不記層樹深難見日壑轉一呼僧百尺捫蒼壁千年挂古藤最高吾直上誰謂老無能寂寂二三侶行行亂艸邊不辭衣盡濕只覺杖居先眺望遺人世憑虛想洞天隔峯聞活活何處有流泉曲折投榛莽幽深絕採樵忽驚山鳥度時覺野香飄虎豹疑蹲穴風烟自捲瓢數禪何好事踵至未曾招陟彼崔巍上悠然得大觀穿松童子健凭石老僧安野火邨邊赤春雲天外寒十年重到此莫怪久盤桓浮石通賢詩石戶無非路層樓疉數巒不關雲氣鎖時有鹿盤桓禾菴真樸詩溪雨淨松岡墟烟散清晝偶期汗漫儔扶藜討深秀既窮蒼崖巔因之剔幌岫磴道隨鳥蹤扳捫化𤠔狖度險心逾豪招呼駭潛獸古木紛離奇青天忽雜糅觸目崩層雲神斧何年鏤厜㕒非一峯嵓嵓啟幽竇頫吸扶桑波朝暾生井甃嵌空自房櫳窈窗烟屢逗初入灝氣深稍深風雨驟頂摩怒虬蟠臂觸飢鷹咮仰摘列星降下驅羣羝鬬銖拂應未磨媧鑪躍冶舊更疑昆明灰蒼然結琬琇陰壁射奇光丹砂鑿勾漏仄身儗蛇穿虎牙閉飣餖危藤褭階梯真居不可就况多宛委藏百靈嚴呵守須臾毛骨寒吹萬激羣吼韸韸鐘鼓音星嵓儼遙扣乳泉自何來冰雪資枕潄轉矚空濛濛千峯失踐蹂談笑振蘇門林壑爭鈞奏指指下巑蚖奇英燦左右目送去雲前心投倦鳥後歸途記所經夷嶮泯襟袖因推開鑿端造物亦乳臭何如抱不雕保兹渾沌壽邈哉起遐思庶與蒙莊究國朝海陵寄翁陸朝詩曾望玲瓏嵓竇好今隨老衲坐雲霄亂山疊障海天暗叢樹紛披霜色驕自借筇枝扶足健同烹石乳與愁澆細看木石爭奇處蹲虎獰龍歲月遙文林寶學張鸎詩青山如故人浩浩自太古攜書坐層岡幽懷乍以吐河漢西北流日月在牖戶一石費盤桓千年亦辛苦怡情貴物先杖屨別有取孤磬正無聲蒼茫悟風雨遠菴本㒥詩乍窮東谷又西岑杖履雖勞興轉深曲折已忘經百險巉嵓直上出千尋夕陽半壁雲初斂秋色盈眸寒欲㑴萬壑泉聲詩在此何須索句學蛩吟嘯堂山曉本晢詩霜雪猶在林花已香寒谷吾師偶曳杖散步山之麓乘興登玲瓏危嵓立眉目峭崿徑插天崚嶒石懸竹置身飛鳥外萬里空穆穆烟際孤雲開滄溟如可掬俯眎清關內皇皇聖人隩自非百世師靈峯誰鎮服暮雲停高岡春風平萬木大行雪汀張士塤詩天設巉嵓鬼鑿工蒼藤扶我上玲瓏誤穿偪仄懸崖裏得坐虛無古洞中雲氣蒸衣渾是白楓枝照眼半含紅欲吞海國空濛象應倩山靈為發蒙巖之東北絕壁閒有洞曰觀音中滴細泉稍偏者曰善財二洞相望有臺曰禮拜足削頂平周以異石明三見楊明詩山名小白華上有觀音洞華落洞門閒白鸎春自哢聞有善財者迹寄紫竹林古洞西嵓下風雨莓苔深高臺禮大士正與玲瓏對士去臺亦荒白華滿山碎清卿僧杲余寅詩石氣蒼茫拂紫烟白衣高照是何年誰懸綺戶遙天外曾幻金身淥水前相傳大士嘗現身嵓上影照池中繞樹瞻依神八萬拈花接引路三千爾時只作尋常看人鬼天龍盡惘然巖之東南有隖曰清風元學士清容袁桷日禪師塔銘清風之隖石列五色國朝黃梅千仞行岡詩寥寥何處聽颼飅曲喻蒙莊總未周縱使松濤千萬斛較將隖內恐輸籌雲門簡菴本孚詩風來鳥不言風去石偏響借問山水人清音可自賞光孝冰壑本元詩晴巒老盡千竿竹隊隊陰森時可掬相過絕勝上樊桐吹落浮雲不敢宿清涼界亦世間有如坐春風人在否誰栽一片亂濤聲又夢柴桑菊半畞夜深月照冷菰蒲謾把南華名自呼忽然騎蝶隨風至秋水篇篇稿屬吾東谷在東峰下群山繚垣高原倏砥上荒發軔往來勞執役之庚星中弼丕基廣播繼隰州之古佛今則乾成錐立幻藏雲停俗以小天童稱宜正名曰古天童明中丞定齋王應鵬詩清瀨蕭蕭起石湍千章雲木蔭成團佛華長在空中現山色偏宜雨後看鹿苑菁菁芝草瑞龍宮寂寂水光寒今宵更有東峯月須上松樓一倚闌四見楊明詩日出扶桑谷口紅數椽茅屋蔽深松老僧出定無餘事盡日門前看碧峯二見通門詩經旬懼炎威不得過東岡立秋喜三日思來拂木牀悠然雙蝴蝶翩翩入我房以無瓶花遶掠取瓦爐香萬物抱靈智資生咸有方小窗欣洞開節候知初凉去來一無語𢠢余情自長小室僅容膝每來生遠心傍有老梅樹下有修竹林開窗見諸峯螺髻青森森日高露未睎階樹垂濃陰寂然無客過山徑殊自深空亭有碑銘細讀閒吾襟歲月已久邁古人光未沉顧盼語諸子兹辰可無吟攜杖出門前坐聽秋鳥音兩僧肩一輿隱隱隔林叫恐余歸步遲知余足力少入門山雨至相顧同一笑野貌不外飾山語亦臻妙呼茗與之啜草鞋各緊峭魚鳴午飯訖無復事遠眺殘雨若霧飛日光隱而照栖遲望村原深谷何窈窕先覺未忍忌三塔重一弔隰州在其中凌然仰高調塔塵手自拭層石使畢耀憶初少林燈猶之任公釣五宗何時分混沌嗟鑿竅歸途山更靜凉颸滿林徼前峯抹烟雲佳處時領要嶺之通於東者曰太白在大雲盤山間一名天童大嶺宋二見王安石詩太白巃嵸東南馳眾嶺環合青紛披烟雲厚薄皆可愛樹石疎密自相宜陽春已歸鳥語樂溪水不動魚行遲生民何由得處所與兹魚鳥相熙熙明飛遯隱鱗聞龍追和山雲山雨驅復馳東來海色凌空披有嶺蟠鬱大雲外高下流泉與石宜行人注目多在足樵子努力行亦遲太白小白如兄弟自卑自邇同熙熙通於西者曰小白嶺舊傳其上多小白華明紀善約菴錢安詩入山遇雨出山晴正是梅天五月程紈扇輕揮清爽發籃輿穩坐白雲迎半行竹徑分僧寺數畝桑田守故塋門外不知溪水漲夜來衾枕有餘清二見余寅詩溪路崩騰萬樹圍午烟明處度人微蹇驢自覺秋風好引領山光遠近歸國朝響嵓聞性善詩嵓從樹頂分坐擁樵雲斷行來數里松前山還有半甓堂周容詩小艇載壺榼野橋壓帽過懷抱忽以舒驟見春水大桃花出墻短黃鳥穿籬破兹行得晴和庶幾窮所慕水遙覺山近山翠漸成綠入橋沙愈明經村烟似沐溯洄富春渚游衍罨畫曲今昔何殊觀心閒興自足大𣹢山勢扼水路似已窮出橋轉汪洋眾流滙羣峯川原互有情動靜理自通思得一俯察振翼凌天風烟火多高樓家在溪聲裏百家同一姓畊讀無遷徙遙望谷口山左廻右復掎相顧同相商黽勉留去水入山問山名樵夫為山導舉鎌贈竹杖藉以驅虎豹廻壑納窅㝠層巒卸孤峭行行寂無人何處答長嘯五步一竚立十步一憩坐聊借目力寬用紓足力惰隴奮生波瀾峯尊集輔佐誤行翻得勝回首惜既過離合見人情去留審山勢岡巒各無言趨赴如受事安能結茅屋抱膝辨陰霽隔澗雙鹿飲穿林一僧至下山路較難路漫不暇擇笠拂松花低裾引藤刺窄崎嶇反忘疲踴躍如有釋亂竹紛縱橫杖轉難為力寄夕向山家雲來吠山犬未忍棄竹杖險阻曾同勉奇褱追往歷幽勝擬繼選臨臥戒雨聲先將竹聲辨晨嵐𠜍山椒須臾壓山趾已息望晴心忽乃得晴喜出巷蜂繞衣循籬袂決雉路因歸似近溪店午烟起若夫石為氣核金之甲根名山硱磳所在皆有舉其稍異者曰響石下太白峰西百餘步縱衡五尺許扣之鏗訇鏜鞳如鐘鼓聲宋三見舒亶詩淵明休弄沒絃琴混沌中含太古音聞說幾回風雨夜四山渾作老龍吟國朝二見本元詩聲非在石由人出石對人言我獨難動舌便煩左史筆誰教相扣破雲頑寶嚴爐雪等慧詩石鐘鼓浪方成響石鼓桐魚扣有聲却笑當年癡李渤亂敲湖石向人鳴又石曰佛蹟在北山石壁上其痕廣四寸許宋四見舒亶詩蒼崖絕壁印苔痕陳迹千年尚似新杖屨紛紛走南北幾人不是刻舟人國朝景星湛菴行嘗偈石上分明是脚蹤不知何處現全容東風昨夜傳消息報道山花無賴紅北山又有石曰坐禪相傳開山祖師嘗於此坐悟又有石曰問水活眼泉遶之故名明蕙江葉憲祖詩一片磐陀坐自呼新苔細艸未全枯我來試效南宮拜石在不知禪在無景心張憬詩絕壑探幽蹤迂廻踏層岌其上饒古苔萬木中獨立悠然山鳥啼活活流泉集鳥去泉不停誰詢風雨急太常繭菴林時對詩罡風磔磔透重陰烟樹蒼茫噪夕禽兀坐相忘鐘磐遠天光雲影逗禪心又有石曰饅頭在小白嶺上正疏嘉靖郡志嶺部石部兩載饅頭石寰宇歌註云唐心鏡禪師鎮蟒時施食所化其石圓絫表白裏黑宛肖饅頭誠心覓之可得國朝二見本㒥偈聚沙作供出嬉游法食何曾有味投欲飽禪家無米飯嶺頭先齩石饅頭亾名偈嶺上饅頭石行人都不識鐵駿餡子酬飽供禪和食山之腠液曰水水之眾流曰川川之屬有澗有溪有潭有池有泉水出自東谷會西澗之流同趨天童溪而歸於清水潭者曰東澗滙北山諸水繞寺右歷外萬工池瀉清關橋外注於舊龍湫者曰西澗澗中磊石異狀素氣雲洄澴波贔怒可灌畦凡數十頃明五見楊明詩西澗逶迤通石橋虎泉一派來山坳瀉月流雲響瓊珮穿沙觸石鳴仙璈矮牀虛枕近溪曲夜半繁聲滿書屋起喚茶童眠不成推窗山月皎如燭二見圓悟偈西澗源從太白來寺西流出遶東廻漫將竹接來廚下飽飲諸人滿腹回三見通門詩春雨濛濛灑一旬青山疊疊阻遊人經行西澗呼童子攜杖相隨伴老身山寺泉聲日在門佇看觸石怒濤噴老僧斫竹來為筧抹過重嵓去討源溪則繇東西兩澗走天童街外者曰天童溪宋三見王安石詩溪水清漣樹老蒼行穿溪樹踏春陽溪深樹密無尋處惟有幽花渡水香又溪繇唐墺出與天童溪相會者曰乾溪上有橋遊寺必經焉受天童溪而枉渚澄碧黛石素鱗皎焉沖照者曰清水潭有唐杜孝子廟國朝二見陸朝詩橋是何人構溪乾不記年家雞棲石罅野菊散葑田滑滑前泥路潺潺別澗天同分山上水昔在此中旋五峯省菴本冲詩影落空潭照歲寒誰將亂石補蒼天依依孝子思親淚一片雲心澈九泉清水潭既納天童溪水其流合凰下溪滙東吳出大涵謂之三溪國朝三見本㒥詩入山迢遰一溪曲溪上人家隱花竹炊烟相接雞犬連帶有高原與平綠行行轉過數峯青又見溪流環衍沃白沙灘沸合遠湍蒼崖深處澄青玉雲物幽森更一天風清宛在子真谷流沿清淺步遲遲忽聽鐘聲飛林麓不知山寺在何方惟見菁蔥擁萬木二見本孚和韻繚繞行來知幾曲過橋不記石與竹急流緩流浮落紅深邊淺邊湛寒綠家家門徑俯瀠洄處處平原資灌沃有時峽東乍驚雷旋逢石咽潄鳴玉指其大者有三溪聚彼眾流成百谷予生蹤跡半天涯佳處無如此林麓隨向一溪縛草堂水檻悠悠負灌木池則有內外萬工又名雙鏡內池當寺之前外池與內者相隔方塘明六見楊明詩雙鏡拭開秋萬頃素娥中夜臨妝靚沙邊鷗鷺窺蟾宮水底魚龍眠桂影野仙踏月池上來坐披鶴氅心顏開袖中拈出一枝篴吹散碧雲無點埃國朝四見通門詩飯後步空池春風颺綠漪出坡人去盡白鷺冷相窺二見通賢詩頭上有天池作底夜間無月鳥疑空遊人只愛開雙鏡不道當年費萬工池之霛者有神龍宅焉在太白峰頂雲霧滃勃生於水面若麗日晴霄澂澈如鏡或風振林木葉落無墮池中者舊在清關橋左相傳心鏡禪師徙此宋六見舒亶詩靈蹤聊寄數峯雲雨意含雲白晝昏不用高僧時咒鉢一泓長貯萬家村明三見余寅詩人傳兹地是龍圍竝海岡巒面面歸功德滿山無一字空多蒼莽白雲飛國朝觀察楚黃念尼王爾祿詩鏡湖梅溼蒼鱗鬬夜半光生忽清晝樹杪飛泉幾百重高田低畝皆成就云是東山太白龍亂驅列𡙇向雲中我方偶讀懶堂句萬村時雨多濛濛太白峯高白日近一泓池水龍常隱應與青山迭往來片言不合興孤憤自是龍性最難馴霖雨蒼生亦苦辛何時獨上孤峯頂呼取雲歸大海濱五見通門詩白雲杳杳接青峯峯上寒潭拜老松縱使晴空常起霧為霖此處有神龍泉之利濟者一曰虎跑在西澗之濱相傳有虎跑地所出宋四見王安石詩供廚煮浴方成沼轉磨鳴舂始到田還了山中清淨債却來人世作豐年七見舒亶詩一嘯風從谷口生直教平地作滄溟靈山不與江心比誰會茶仙補水經又泉曰活眼出鉢盂峰下涓涓不絕明蕙江劉憲寵歌衲僧幾個眼睛活惟有此泉真活潑一滴疑傳獅子乳九天倒瀉蒼龍沫源混混兮來無端聲淙淙兮去不歇君不見波面無風紋自生山頭有月光可掇我來拊手嵓石間空華何事金鎞撥泉之澇不盈暵不涸者曰弘法在寺法堂下密雲禪師甃之而未名今奉新錫寺額名焉昭恩澤也國朝太史立菴史大成銘未有此泉法從誰液謂泉即法泉從誰闢靄靄密雲𤀹此一脈弘覺溯之迺霑天澤泉乎法乎弘之無斁水非石鑿而能入石入山之關有三一曰萬松關二十里松之始在小白嶺外二曰鐵蛇關在小白嶺上心鏡禪師築鎮蟒塔於此故名三曰清關在外萬工池之左有橋跨澗上其下飛泉噴玉清響如環珮舊龍湫承之復從縣崖奔壑練影拖巖鏞聲振谷滿地白雲關不住清泉流出落花香斯實錄也明三見圓悟偈萬松關不為關松警策行人入路通忽若有人親撞破方知直透萬松中鐵蛇雄踞嶺頭峯截斷行人路不通直下一刀全殺活任從南北與西東橋水原無清與濁祇緣到此別人間雖然都打橋中過未審誰人透此關中條敬身陸寶清關詩奔泉倒峽忽成關流者無心聽者閑坐久全身疑水化耳根先到石橋還國朝二見張士塤清關詩可惜清關水滔滔愛出山挽留無計策從此溷人間遊山不住山終然汚泥滓水聲忽笑人汝亦暫清耳山川得題品則泉石生香題品非傳神則山川不受一峰一澗類如眉目分形全水全山方見性情具體分形下既已刮目揚眉具體間可無怡情悅性嘅烟霞之漶影采金玉之餘音勝境於此紀吟遊寺別傳崇建用循歷代以次而書宋五見王安石詩山山桑柘綠浮空春日鶯啼谷口風二十里松行欲盡青山捧出梵王宮又憶東吳太白山水詩城頭回首距幾何憶得好處長經過最思東山春樹靄更憶東湖秋水波三年飄忽如夢寐萬事感激徒悲歌應須飲酒不復道今夜江頭明月多八見舒亶詩日日青鞋踏白沙未應泛艇即靈槎雨溪清越鳴哀玉風蔓蜿蜒動暗蛇曉潤芝𥰭挑秀茁午香茶竈煮蒼芽玲瓏仙客知何在千古烟霞自一家又再遊山回夜集諸友詩太白嶄嵓幾百尺仙人一去無消息臨雲時復倚闌干獨看千峯萬峯碧昨夜長鬚城裏回報道湖上秋風來醉園雨過月臺冷籬根白菊看看開却杖青藜趂流水目送征鴻下山觜蓬船答浪遶叢蘆咫尺烟汀幾萬里忽見江頭江月白紛紛笑語城東陌一尊北酒一枰碁未到懶堂猶是客宗伯深寧王應麟四明七觀略明多名山竺乾氏居之寶地金繩祖花禪枝南有雪竇東有太白飛瀑淙淙層巒𪚊𪚊二見謝翱詩筍輿行萬山中有十里亭老樹祇一色野公逾百齡柴關當太白藥氣近樵青岡草黏枯翼巢枝落退翎期探幽谷水共斸松根苓艾納下天雨塵風吹冥冥明浦陽九靈戴良詩避囂去城市遣悶在川岑遂申獨往意行此無盡林松篁儼映鬱蒼翠邈深沉九隴山已見三生石可尋列嶂圍招提傑閣俯嶇嶔池光亂塔影澗流傳磬音龍化井已竭虎去泉徒深周顧信靈迹遲留多賞心念未委塵妄事可息煩襟即理苟已協何用戀華簪正科薛士銘詩太白山高鎮海壖招提幽瞰九峯前玲瓏嵓接三千界伏翠菴通尺五天龍捲靈湫飛絕頂虎跑平地出甘泉振衣未覺登臨倦愛聽松濤戰耳邊中林孝謙李本詩青春廿里萬松關小白前瞻太白山度嶺路迷黃葉裏隔溪人語白雲間海龍護法聽金磬野鹿叅禪獻玉環老衲相留成信宿浮生贏得此偷閒方伯訥齋錢奐詩冒雨尋幽勝行行不憚遙山高雲外寺水曲澗邊橋鶴隱松藏玉桃開洞簇綃日斜迷去路招手問歸樵郡守三山希玉鄭珞追和荊公韻碧山雲盡樹蒼蒼十里松陰半夕陽吟到石嵓清絕處曇華芝艸暖生香郡守孝感宗器張瓚用舒龍圖韻春日遲遲步暖沙却慚漢使遠乘槎玉珂聲引巢松鶴鐵鉢香來伏澗蛇白石玲瓏生蘚暈紺園芳郁長茶芽當年童子多神異薪水曾供老衲家郡守莆田景由方逵詩入春郡事喜從容乘興來登太白峯谷靜不聞啼一鳥山靈誰敢佩雙龍陰陰十里松關路隱隱數聲花外鐘分付前驅休喝道林間歌頌有黃童中丞守黑張楷詩乘閒拉友玩天童九隴相環秀氣鍾紫霧頻封禪丈室白雲時擁鉢盂峯八功德水呈天碧七窣堵波插漢雄東際逶迤泉轉磨西邊奇怪石玲瓏清關橋鎖禪心定響石聲驚鳥道崇太白崖端存佛蹟善財洞畔隱仙蹤虎跑甘澤師威重龍臥高湫雲雨從五鳳樓高翬岌岌萬工池濶水溶溶大雲侔與中峯秀幻智相歸伏翠濃千載垂池獅子柏萬年夾道茯苓松三關款款驄車駐九鎖重重薜荔封勝境由來觀不足古今風景宛然同太僕本清金湜詩行盡青松始見山暖風微雨路斑斑欲尋開士棲禪處訪無傳孠禪師直到中峯疊翠間滿地竹陰人跡少四簷花氣鳥聲閒清茶啜罷悠然別不許袈裟送出關觀察括菴錢瓚詩古剎摩空一徑幽躋攀今喜恣遨遊春花委地紅將盡山色盈眸翠欲流虎臥閒林僧未起龍歸禪鉢雨初收盤桓且適豪吟興不管談經石點頭二見張憬詩侵曉登山閣凭闌四顧賖嵓花經雨落江燕逐風斜頓覺心偏遠那堪鬢欲華何年塵屣脫石竇吸流霞參政白齋張琦夢遊天童詩聞說名山近上台每憑孤夢繞崔嵬雲從貝葉文邊過人入蓮花漏裏來大士作齋吹宿火伏龍潛水抱輕雷一場殘寢隨鐘覺日出東方事又催應奎倪光詩溪下獨行遠遙聞仙梵音九峯廻寶地五鳳出珠林古殿香雲合閒房艸木深寧知百年內忘却去來心桂林守石窗華愛坐雨詩夜半雨聲碎朝來轉細微疑愁松徑滑未覺石泉稀簷澑鳴常滴山禽溼不飛子真吾憶汝空谷限東西方伯石溪陸銓詩溪轉峯廻翠藹新諸天樓閣傍星辰深山筍熟人如市禪室茶香客過頻龕燭能留長夜月嵓花不斷四時春共來物外舒塵縛莫厭披襟與岸巾二見王應鵬詩太白峯頭一振衣碧空無盡鳥孤飛林間野鶴何人馭天下名山有寺依木葉晚風金氣肅松堂凉月夜光微寒泉百尺秋雲裏僧在玲嵓靜掩扉司空堇山李堂和韻長風十里散雲圍登盡危峯思欲飛路夾青山天有障林飄紅葉鳥無依玲瓏石應千嵓響太白岡通一線微幽谷驚傳驄馬使不妨老稚款柴扉司馬東沙張時徹詩徑轉諸天近淵深眾壑歸山峯長礙日松霧細霑衣展席依青艸題詩對落暉却憐雙白鹿時自款嵓扉文林史元中詩行蹤絕勝訪蓬萊廿里松行隱寶臺靜院竹深招鶴引禪房雲冷倩風開登高賸有思蓴興作賦慚無倚馬才獨立斜陽傷往事春風十五度重來郡守華亭鳳峯沈愷詩屋下清溪屋上峯禪房寂靜許誰同白雲深護無人到遠錫相尋有路通綺里一生居海國廣成千載在崆峒往來欲買匡廬住調鶴餐霞意未窮郡倅東齋劉世偉詩海邑驅馳久僧房坐夜深不眠翻貝葉失路感鄉心岱岳長難見平原未可尋隨緣問法侶何處可投簪少司馬東明范欽詩早從圖記識名山紺殿春晴試一攀天削芙蓉開九嶂雲深松檜裊三關坐憑星斗虛無裏行拂烟霞縹緲閒借問天仙何處所好驂鶴馭月中還月漁盧澐詩山房開曙色樹杪散鵶聲路自中峯下人依峭壁行石臺霑露淨林竹鎖烟晴未盡躋攀興空餘悵別情嘉則沈明臣詩千盤萬轉入羊腸繡佛猶傳古道場日月池曾臨法象玲瓏嵓自引朝陽鐘聲谷口風吹斷海色天邊秋去長極欲皈依無奈老馬蹄空度白雲鄉曉汲寒泉潄齒香病維摩欲臥津梁石塘老柏驚龍蛻白日清池拭鏡光山勢南來滄海大水聲西遶寺門長杖藜吟過秋山下槲葉初黃作雨凉外翰徐德中詩石磴梯雲入乾坤別樣清水聲喧晝夜山氣弄陰晴花雨香飄殿茶烟月在庭樹深人不見何處誦經聲相國文恭沈一貫詩拂霧躋危磴披烟數亂山一松承日起群鳥送雲還細溜經寒澀初苔得雨斑心馳縞衣使獨此伴僧閒廷尉貞吾陸世科詩家在鑑湖常見水心存空谷未忘山半宵月夢歸何處廿里松陰久不關嶺外昔傳廷尉宅蔡大理公諱錫峯頭猶是謫星鬟我從險處經行過惟有冰霜識者顏郡李海岸忠潔黃端伯詩石徑沿溪樹百重松梢歲老欲成龍當年太白曾留記石潄寒泉不露鋒二見圓信詩空邊細語轉初庚破曉花枝香露撐隱蓋幻成天帝宅清關不放野人行淋漓喬木風霜古窈窕池塘秋水聲只此金湯非易得無虞千載若為驚又塔封事訖且抽身曉嶂重重接遠鄰飄影葉乾風拭露點衣寒翠日初新泉鳴沙澗游山客天指肩輿過嶺人獨抱苦心帶歸去雙眉欲解在三春國朝二見王爾祿追和荊公韻谷鳥溪花尚未空黃昏凉月夢松風此山一別長庚去又見開元紫極宮郡參軍內丘文衣喬鉢詩少微不暎高人日太白未為童子前自有蒼山真面目浮名多屬世情傳江陰任天張拙追和荊公韻松杉十里鬱蒼蒼度嶺穿雲正夕陽最喜澗邊無暑氣水流惟帶藕花香心廬楊文沆詩山花名未盡嶺雨細還生古木千章待鳴泉百道迎香來知寺近黴重覺衣輕入世多傾仄甘兹滑滑行杲堂李文𦞩詩引我登亭子披襟望望間松陰交一徑竹氣老諸山日慕嵓頭宿雲尋谷口還行行常慮盡聽水又清關崖谷能開興芒鞋去徑然巉嵓斜導日涸石亂欺泉引臂猿騰處褰衣虎嘯前舊游誰紀勝遙問永康年附太白山樵德介天童懷古賦夫長庚星現兮徵興師之道行大鑒堂開兮接六祖之薪傳堂額係宋景濂篆書西晉惠帝兮始創永康李唐兩賜兮玲瓏天壽景德四年兮奏請即以景德兮錫額兩浙兮稱五山之一四明兮推首剎之尊太白名山兮宋孝宗之宸翰奉藏雲章樓兮住持了朴朝元寶閣兮元大德之重顏勅撰銘碑兮危素中書太白峰下兮響石伏獅嵓上兮龍潭東岡疊疊兮結紺殿西水潺潺兮轉清關雙池兮似斗七塔兮象星七星之象落葉無蹤兮魚吞活活之水池中不受落葉重巒有影兮嵓影入池無火厄波泛蒼蒼之雲龍泉鼎兮從水出千僧鑊兮受土埋時濬池得二物池上亭虛兮誰印月昔有印月亭院西閣廢兮孰臨雲舊有臨雲閣多寶塔兮形影與齊者法璿古宿塔係唐秘書萬齊融所建璿師經行其下影與塔齊華嚴經兮誦聲俱徹者海門禪師師出方丈佛誦起至回已畢人不信命八十一人同誦有聲廿里松行兮舊聽晴濤謖謖疎鐘空谷兮遙聞清韻鍠鍠重鑄鐘兮法等又栽松兮子凝萬佛閣碑兮太史樓公撰述千僧堂記兮隰州古德雄文嵓竇玲瓏兮得窺日月之通明荊公久登兮舒嘯穴隙光射兮曾摹詩偈之滿壁臯羽雨飲兮取歡不知何佛兮踏破蒼苔留幻跡西崖有佛跡那管是伊兮斃然㘞地坐禪心崖有坐禪石嵓方兀兀兮諸祖相傳名祖印西有祖印嵓峰挺圓圓兮千佛授受是佛盂後有盋盂峯方丈前樓兮疊翠高崖西畔兮更幽玲瓏嵓下有亭虎跑泉兮西阜王荊公有詩鹿鳴坡兮後山後山鳴客至東鳴齋主來西鳴病僧亡夏凉森蔚兮來坐羅樹圃長庚旁有冬木凋殘兮均尋核桃坑在寺東多核桃問水攀藤觀活眼寺西有問水石下有活眼泉散花斛食化饅頭小白塔下名散花岡心鏡禪師建塔施食饅頭化為石二主謙謙兮亭名揖讓張狀元同大慧杲訪宏智覺嶺上遜之不已張公名其亭一心寂寂兮閣曰涵虛昔有涵虛閣禪師修道其中荷池蕩漾兮十月集鴛鴦之泛濫東谷有荷池案岫青蔥兮昔年下凰鳳之翱翔前山有凰下溪萬松關兮名虛設十丈柱兮跡尚存宋時跡在路應供堂兮展千鉢漏砂鍋兮不漏米鍋從天台聖僧送來藏經閣兮積萬圅飾玉軸兮又飾籤游客散塲兮應宿鷺池上有宿鷺亭歸僧隱蓋兮不驚鷗松行有隱蓋亭晴窺萬竹栖青鳳傑祖塔于青鳳山旱禱高山請白龍鎖翠亭兮魏王妃之親筆宏智碑兮張孝祥之遺書中峯菴軒兮疊秀夢堂有賦高元之跋語今存殘碣破砂盆碣兮重光傑祖遺偈立石於菴成殘碣今重刊于祖堂秋蕙春蘭兮尋滿谷清風明月兮坐經𡎲釜內茶香兮爭烹雀舌山中筍熟兮盡拔龍鬚蒙堂兮休老此軒兮養賢左菴良侍奉實菴茂于軒妙光塔兮即之筆栴檀林兮道生書秋殘崖上看紅荳清關橋上有紅荳崖春始嶺頭觀白花小白嶺上多小白花故名堆雲廢兮獨留雲影應菴塔院名堆雲伏翠移兮聊存翠峯伏翠今存南嶴西崖惠兮塔幻智塔在山頂東嵓日兮瘞清風袁文清銘云建于清風塢盤山久隸常住兮祀摩訶之法身蔣摩訶布帒和上之徒塔于盤山寺有盤山莊佛隴原同一派兮見濂溪之文記佛隴寺唐時咸啟禪師所建春樂無軒兮猶見月痕雪白梅花有屋兮惟存樹老雲香梅屋春樂軒先賢植梅處獅柏秀兮禪師再至魚藻生兮曾祖始來普同院迥兮環秀峙涵碧橋崇兮鎖乾溪九隴盤結兮石蒼嶴三溪滙合兮清水潭鬼谷仙兮南滄洞太白山後有鬼谷祠葛仙翁訪之有詩杜孝子兮太白祠唐杜雍避裘甫之亂棄子負母隱此徵之不起歿而祀焉補山缺兮建鎮蟒挽逝水兮護沙龍懷已往兮不見知將來兮何稽聊題幻語兮書幻事霞川雪汀兮復誰收
