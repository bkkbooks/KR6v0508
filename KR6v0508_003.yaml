未行雪峰牒至領事半載而天童詔下衆歸如海復見宏智昔時之盛育王虛席師攝住持事往來說法兩山閒曾云天童用底來育王用不著育王用底歸天童用不著雖然如是用不著不著處用有餘一箭雙鵰隨手落淳祐甲辰有旨移靈隱已而歸隱金陵朝命以虎丘俾養老不就留守以蔣山起不應戊申春以育王召使者三返卒不奉詔明年遷徑山疾作升堂說法不廢二月末始不出堂然說偈書贊嬉笑言論如平時侍僧以遺偈請麾斥不顧已而笑謂侍者曰末後一句無可商量只要個人直下承當十四日夜分起坐入滅歸葬金陵山中師嗣薦福道生生嗣密菴傑其法嗣正心叟等五人附紀元叟端跋大慧諸老墨蹟有云癡絶見曹源天目見松源其法中伯仲也偃溪晦巖斷橋同時鼎立茨菴堯禪師舊志缺今補師嗣法於或菴體體則枯禪鏡嘗參焉與木菴永水菴一同時續燈録諸書惟載師名而無傳故其住持天童之蹟無從而考石帆衍禪師舊志缺今補師嗣法於道場山運菴嵒禪師嘗住持天童而無蹟可考怪石奇禪師舊志缺今補師嗣法於雲峰高禪師初主大慈後遷天童止泓鑒禪師師嗣法於偃溪聞聞嗣徑山琰其法嗣竺田霖等二人石門來禪師師嗣法於靈隱濟與蔣山東叟愷雪竇野翁同同門濟則徑山琰之嗣也別山智禪師本傳師諱祖智蜀之順慶楊氏子年十四得度初聞僧誦六巖語悅之時巖住蘇之穹窿亟往從焉因閲華嚴經彌勒樓閣入已還閉之語恍如夢覺遂頌靈雲見桃花云萬緑叢中紅一點幾人歡喜幾人嗔巖頷之越二年遍叩浙翁琰無際派高原泉淳菴淨妙峰善諸公最後見無準範公於雪竇公知是法器待之彌峻時或棒喝交下一語不少貸師擬答噤不能發由是知解都喪久之作而言曰吾生平伎倆皆死法今見此翁始行活路既公移徑山命師分座嘉熙戊戌洞庭天王虛席迎師主之寶祐丙辰天童寺燬制相吳公潛判州事奏師道行師被旨攜一鉢一囊至縛茅以居時州久旱師禱之輒應人情奔湊不三載百廢具舉天童始復舊觀庚辰九月旦忽示衆云雲淡月華新木脫山露骨有天有地來幾個眼睛活越十日夜分珍重大衆叉手而寂壽六十一坐四十七夏塔全身於中峰密菴禪師之塔右稱四十代住持玉局文復之為塔銘師嗣無準範絶岸可湘禪師舊志缺今補師名見於別山智禪師塔銘碑鐫住持沙門可湘立石考世譜師與智公同門相繼住持者六人蓋嗣法無準範西巖惠禪師惠一作慧惠與慧通舊志缺傳補傳師諱了惠蜀之蓬州羅氏子垂髫與羣兒戲必摶泥沙為佛塔象一日玉掌山祖燈至其舍向之合掌父母以師資宿契遂令出家燈授以般舟三昧非其志辭往成都謁壞菴照於昭覺器許之囑令南詢乃參浙翁琰於徑山聞高原泉為人徑直心慕之適原赴台之瑞巖師與俱往一日原問山河大地是有是無師擬開口原即喝出師復呈以偈原曰沒交涉師一日偶書白楊示衆語原閲之笑曰寫字與做言句儘得爭奈沒交涉何師憤悱莫申原曰吾方便屢矣汝自不顧蓋緣不在此其往雪竇乎時無準主雪竇師造席下自陳來歷準訶曰熟睡去繼而令充不釐務侍者一日謂師曰覷不透處只在鼻尖頭道不著處不離唇皮上討之則千里萬里師抗聲曰將謂有多少準遷育王師侍行從容承稟乃盡其要逮準居徑山往典藏教復升第二座自是聲動叢林節齊趙觀文作牧蘇州舉師開法定慧衆集寺治時甚稱之遷東嘉能仁江州東林而至天童咸有偉績先是師依靈隱妙峰時靈隱修兩廡壁畫以五十三參相衆俱以偈賀師亦有而妒之者不以登卷妙峰閲卷問師何無師曰有不足登卷峰曰試舉看既舉峰親為書之卷首其偈曰幸是十方無壁落誰將五采畫虛空善財眼裏生花翳去却一重添一重播聞諸方並加贊歎晚居寺之幻智菴將終戒執事已問曰今何時對曰二鼓矣遂放身若投斯須視之已逝景定三年三月十一日也壽六十五夏四十七師嗣無準範其法嗣東巖日等三人存俟舊志失載師之塔稽師晚居幻智菴而塔在盤山下幻智菴後舊志誤載日師塔日師塔在清風塢袁清容有銘簡翁敬禪師師諱居敬景定四年復作千佛寶閣蓋西巖惠禪師示寂之明年也師有上堂舉話二頌補載法要考月窗圓禪師舊志缺今補師嗣法於枯禪鏡禪師嘉靖志收在先覺考元環溪一禪師舊志缺今補師嗣法於無準範禪師與西巖惠月坡明同門月坡明禪師舊志缺今補師諱普明鄞人嗣法於無準範禪師按天隱圓至禪師書明侍者挽詩後云月坡禪師董天童二年四方英士魁人他叢林不能致者皆聚席下番陽明東澗與豫亦在焉余友雖衆惟海東雲琦楚石及明諸子而已師傳世有牧牛頌十首長翁淨禪師補略師諱如淨嗣法於雪竇鑑禪師參庭前柏子語有省呈頌曰西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝裁𨁝跳松蘿亮格笑欣騰鑑頷之又頌楊岐問僧栗棘蓬你作麼生吞金剛圈你作麼生跳云肘後驀生閒落索風前忽布閙叉撐那吒八臂空惆悵夜半三更白晝行出世歷數剎後遷淨慈奉敕住天童其法嗣石林秀孤蟾瑩等三人東巖日禪師補傳師諱淨日南康都昌廖氏子幼喜誦佛書解大義常食蔬果以自持年十五告父母願出家明年祝髮於廬山香林訪道仰山石霜遂入浙見沖師於靈隱越二夏不契乃登徑山見無準範大許之後見西巖惠於天童惠為範之大弟子危機敏鋒渙然帖順遂密契其旨後開先無文璨延為第一座譽聞益彰宋景定間汪公立信帥江東推主圓通咸淳間漕使錢真孫俾兼領東林元至元壬辰主育王三年歸隱雪竇大德四年主天童時年八十一思念寺當隳弛之餘年老承此重任召其徒東圓慶三人分布之曰東我與江鄉士民有緣汝往代宣吾志得財為建萬壽乾元寶閣範銅成千如來像暨供具汝其任之圓汝諳吏事城中官府汝譍承之慶汝小心謹慎和燮上下考歷贏數惟汝為能汝守衣閣不五年而閣成像備推餘資就海隄田一區以贍齊盂官府上下雍肅雖出三人之力皆由師規訓有素所致至大元年世壽八十有八僧臘七十有一將示寂戒其徒書韻語以示曰天為蓋兮地為函吾奚為乎塔與菴灰吾骨兮山阿言已矢兮勿鑱沐浴端坐而逝及化齒根不壞斂藏於西巖之清風塢學士袁桷為銘師嗣西巖惠其法嗣大愚安等五人從正師本宋人故舊志列之於宋但其住持天童則在元改列元者重在紀寺也平石砥禪師補略師諱如砥嗣法於東巖日袁文清公銘日公塔蓋師所請也文宗至順初住持天童時木菴聰來謁留居侍司繼而恕中慍亦來參命典藏鑰居十載實菴茂以篤實無僞於道師極推重之則師之品與法可概見矣竺西坦禪師補略師從華藏遷主天童孚中信以參究諸方弗合不勝憤悱隨詣師質所疑師一見知為法器厲色待之不與交一語信乃羣疑愈熾一日上堂舉興化打克賓公案為問信擬師曰俊哉師子兒也信自是依止不去就職維那又孤峰德首謁師於天童師曰汝從何方來曰金峩來曰金峩山高多少曰不見其頂師斥之益自策厲以必證為期明宋文憲公曰惟昔天童坦公以一真之學上承松源四葉之傳黑白趨慕儼如毛之有麟甲之有龜也師嗣虛舟度度嗣華藏通通嗣松源嶽其法嗣孚中信等五人雲外岫禪師廣略師俗系郡之昌國州為人身材眇小精悍有餘依直翁舉禪師得度舉嗣東谷光光嗣明極祚祚嗣自得暉暉嗣宏智覺師蓋宏智六世孫究明曹洞宗旨盡其源底初住慈溪石門歷象山智門遷郡之天寧已而繼竺西坦席住天童說法巧譬旁引曲成後學至奔軼絶塵雖鶻眼龍睛亦難窺瞰生平不倨傲不貪積不私食得施利隨與人見後生敬之逾謹清容居士袁桷寄以詩曰太白山高雪四圍孤峰翠織五銖衣誰言老子寒無力獨擁紅爐更下幃又答韻云太白峰高積翠明老禪的的寄深情相思沙礫惟懷璉獨立蒼苔近子卿舊業久荒松露滴浮名空眩槿朝榮定須結社修真隱寒月深燈了梵經笑隱欣禪師代諸方勸請師再住天童疏云太陽傳法立孤猶嬰杵之難辨才出山歸者如岐邠之衆信知在德不在力孰不有祖而有宗惟兹藐然是可忍也和尚氣養沖淡語出渾成胸次廓其町畦高風激彼貪懦長空一碧煌煌東方之啓明諸峰四圍凜凜雪山之太白自有神龍呵護不為尺蠖求申世路多岐可以南可以北簡書相恤式如玉式如金更始重盟益敦舊好及示寂無餘資禪者率錢具後事塔於東谷稱四十九代住持其法嗣大方聘獨木升愚菴省無印證質誤舊志列師于竺西之前且言法嗣雪竇證一人俱誤東雲海禪師舊志缺今補集證師諱佛海按千巖長禪師語録有跋末署前住天童佛海老人書又愚菴及禪師有跋天童佛海禪師遺墨語則海之曾住持天童明矣又天隱圓至禪師云余友海東雲琦楚石又書定惠院海書記壁云東雲與余偕去鄉並途而遊迹半天下余留鄮山東雲自太白先余歸後三年乃相見受業定惠院與東雲歎契闊悼故舊為留數日乃去按此所謂海書記即東雲也是時尚為定惠掌書記又瞽菴顯示禪師初受具首謁天岸指見佛海云師所跋千巖語録云言乃載道之器道本無言因言顯道雖欲忘言其可乎千巖和尚以身為舌塵說剎說熾然說吾未見其有言也此話大行何待三十年後至正七祀丁亥季春前住天童佛海老人書時年八十愚菴跋師遺墨則云河南褚士文博學而尤精書法四方多士咸願遊從嘗與太白佛海為方外交徵言於海海時年八十有五能作凍蠅細字手書舊詩數十篇酬之士文寶祕珍惜時一展玩如見古道顏色雖隋珠卞璧不換或謂佛海為一代尊宿不以本分事接人遺之以詩有失大體豫曰不然上乘菩薩善巧利生乃至示現種種形相與其同事佛海遺詩豈非四攝之一也噫儒與釋分兩途跡雖不同道實靡間苟非達而不拘者往往肝膽楚越觀士文佛海之風亦當少愧以師至正七年丁亥值八十歲溯之則生於宋度宗咸淳四年戊辰當東巖日示寂之年師年才四十有一歷平石竺西雲外三住持則師之住持或在泰定間厥後龍門膺以至正三年癸未孚中信以五年乙酉泰定逮至正僅十餘年其中安知不又有遺載如師者乎且以泰定計之師年亦六十矣龍門膺禪師至正二年壬午江南行宣政院命妙明真淨主大華藏寺淨舉師自代明年癸未復命師補天童初以疾辭旋來主寺未幾告終塔於普同塔之左與法為禪師塔並峙正誤舊志誤列師于元明良之後孚中信禪師廣傳師諱懷信奉化姜氏子母劉夢拾吞大星而孕稍長受三經於剡源戴先生表元年十五從法華院子思祝髮受具戒於五臺寺初聞延慶半巖全公弘三觀十乘之旨久與之遊既而歎曰教相繁多是誠算沙徒自困耳即棄去遍往參叩弗合乃參竺西坦公於天童公知其為法器而故厲拒之一日舉興化打克賓公案以問師擬公曰俊哉師子兒也繼公者雲外岫公公命師司藏鑰文采漸彰泰定丙寅請師出世郡之觀音天曆己巳遷補陀洛迦山丐食吳楚間鎮南宣讓二王俱虛心問道隆禮頻仍師從其性資而導之一時當軸大僚以師行上聞詔賜廣慧妙悟智寶弘教禪師之號及金襴法衣一襲至正壬午主中天竺乙酉乃遷天童百廢具舉而佛殿之巨役亦更新之尋建塔中峰慨然有終焉之志己丑冬江表大龍翔寺特迎師主席提唱宗乘補建海會堂莫不翕信會明師下金陵寺僧風散師獨趺坐目不四顧執兵者滿前無不投拜高帝嘗幸其寺師說法要嘉師言行純慤特改龍翔為大天界寺師一日晨興沐浴更衣趺坐書偈曰平生為人戾契七十八年漏泄今朝撒手便行萬里晴空片雪時丁酉八月二十四日也茶毗於聚寶山前獲舍利如麻菽五色燦爛烟所及處亦絫絫然師賦性沖恬歡溢眉宇未嘗以聲色加人人有犯之頷首而已日默誦法華經七卷雖流金折膠不為閒示寂前一日高帝方督師江陰夢師入謁帝問曰師來胡為曰將西歸來告別耳未幾駕還金陵聞師訃正與夢符大相驚異詔出內府幣帛以助葬事且命堪輿家賀齊叔為卜金藏舉龕之夕帝親臨奠送之都門外備極崇寵其舍利遺骨塔於金陵牛首山宋文憲濂為之銘在天童有塔者則別分爪髮衣履也其銘則夢堂曇噩所撰師嗣竺西坦法嗣雙林致凱等十有九人從正舊志列師于明以受明崇寵之盛也詎知志以紀寺自當以住寺之時為定故改系于元况師之後住持于元者尚有雪窗原明了堂若一錯移則序次皆紊矣雪窗光禪師補傳師諱悟光字公實成都之新都楊氏子母張夢觀音大士授貫珠而娠及生有風雲光景之異幼遭父母繼沒舅氏賢公學佛於天王寺往依之既而受度於了沖年十五詣大慈講席備閲鈔疏謂義滯見解振衣出峽遍訪禪林後至杭於淨慈謁東嶼海公一見即待以法器杖厲頻加師堅坐苦究因夜半飛蛾撲燈有省造方丈應畣如響羣疑頓釋益通明內外典隨侍海公於靈隱至順元年請師開法平江之白馬元統元年住開元至正二年舉師主育王一切改觀而次第營建靡弗壯麗有佛日圓明普濟禪師之錫號會天童虛席宣政院俾兼領寺事師以五日分會說法俄得疾危坐作書遺偈而逝至正十七年丁酉六月朔正兼領天童之歲也虞文靖公集嘗贊師云雪嶺西來岷峨最高橫絶江海天風雲濤佛果一枝鳳毛麟角芳躅遠踐鄉有先覺危太朴素之銘曰裴回玉几采芳蓀振衣太白挹朝暾師與文字交者金華胡長孺魏國趙文敏巴西鄧文肅天山馬文貞詩有雪窗集師嗣東嶼海海嗣石林鞏法嗣忍菴慈塔在𨞝峰草堂應刪舊志雪窗光之後有實菴茂茂主清凉後退隱東堂原明良茂之猶子因迎歸天童之此軒無幾而逝未嘗上堂開法例不得入先覺當時不察而誤設位應刪改雲蹤原明良禪師廣略師諱元良字原明號左菴寧海周氏子初住台之瑞巖至正十八年行宣政院奏師道行被旨住天童重建朝元閣範萬銅佛於其上危參政素奉敕紀其績賜善覺普光禪師之號又於二十年庚子訖丙午築海隄五百七十五丈成田一十七頃有奇為萬佛莊塗田夢堂曇噩記焉師主席一紀值明興之際退居東谷力修山宇事在洪武丙辰丁巳間戊午己未操文兩祭宏智禪師袁廷玉珙有寄師詩云歸去山中筍蕨肥石泉茅屋薜蘿衣一經靜坐蒼松下閒看孤雲自在飛師嗣別源源源嗣竺元道塔於東谷菴前東南之麓稱五十八代住持從正舊志作元明良以原良為名元明為字也按危素奉敕撰碑其文稱臣僧元良者凡三則元良名而原明字也左菴即良之號別標一人宜刪了堂一禪師補略師鄞人至正間住台之紫籜次遷鄞之天寧後住天童則至正之末矣其示衆有云樵歌來疉嶂帆影落汀洲胡孫戴席帽直上樹梢頭七星劍五雲樓毬打人兮人打毬萬事難把玩魚吞水面漚師嗣竺元道道嗣橫川珙其法嗣呆菴莊明木菴聰禪師舊志缺今補本傳師諱司聰黃巖謝氏子年十五從鄞之靈峰汶公祝髮受具元至順初謁天童平石砥公為侍者後至武林見竹泉於中竺參竺田於靈隱登徑山依元叟端公典藏自謂沙門釋子當以治心為先務治心之要惟明惟靜明以照昏靜以止亂昏亂既除慧光自顯可不勉哉於是益加勤惕久之又自察其所守不離見聞覺知遂入天台旋來太白閉一室於蒙堂禪觀禮誦日有常課嚴威儼恪人皆敬服戊戌行宣政院檄師出世里之洪佑為道公嗣重隄海塘之田以裕衆食癸卯遷國清繕修衆宇洪武二年天童良公詣善世遜師繼席五年詔兩浙高僧較讎梵典師預焉事竣還山退居東堂後以示疾入滅塔骨於寺之西麓應刪舊志列呆菴莊禪師按莊塔銘云初參左菴良禪師于天童繼參了堂一禪師于天寧後歸候左菴命典藏鑰未幾了堂住天童師執勤愈謹洪武十年丁巳性原明禪師延師講授楞嚴諸經十二年己未出世撫州北禪嗣了堂一未嘗住持天童應刪壽巖昌禪師舊志缺今補集傳師諱智昌別號友幻台黃巖陳氏子甫丱厭居俗里父母使從邑之治平寺虛中滿公剃染事師甚勤鍾愛之受具於明之五臺寺繼謁枯木秀公於大慈激以究明大事謝絶世緣危坐蒲團足不越限未幾往霅之道場參玉溪珉公明年遊江左時元文宗以金陵潛邸建大龍翔寺笑隱欣公說法師依居久之復謁無見覩公於華頂返四明適孚中信公唱道天童雅愛相重後行宣政院起師出世於大梅保福開堂為玉溪嗣時寺久廢不數年産宇一新又以其餘羡隄海田寺復重興洪武二年退居寺之東澗菴又三年公起昌國之吉祥又二年遷天童疲力人所不堪而師則怡然自處十年冬詔兩浙高行僧入見內庭而師在其列頒制天下僧徒以晝講夜禪之規明年冬還山示疾而逝塔在伏翠菴前舊有斷碣文雖存名泐而不知為師故前志缺焉永樂鄞志鈔有傳因得參訂之其法嗣保福希素妙嚴道遠湛然性禪師補略師諱自性雲陽韓氏子嗣法於季潭泐溯大慧杲為八世孫其初出家於溧陽泓溪慧照菴禮慧海智公為師一日海問父母未生前誰是你本來面目自此懷疑多年時與旌川草菴一幻生福友善切磨激發二公之力居多一日舉有句無句話問師師擬議菴劈脊便打師憤然徹夜不睡天明忽聞敲火箸作聲豁然洞徹乃謂菴曰夜來公案今日要與汝決斷菴握杖問句歸何處話未絶師劈手奪杖拗作兩橛攛向窗外曰別處燒徑入堂去臥幻聞特來問曰且喜性兄大事了畢也師喝曰賊不打貧家兒一日問菴祖意教意是同是別它道秋樹飄黃葉寒天掘地爐今日請和尚決斷曰病翁年來腕無力拄杖牀邊