龍峰下銘其自製天童有塔在𤫩瓏巖奉藏爪髮者師行履有紀年專譜闡揚有語録詩文有集應召有北遊録其敕書暨御賜諸物具載本志盛典考中費隱容禪師師諱通容閩福清何氏子幼孤年十四叔父送鎮東衛依慧山師出家初參壽昌經有省後參博山來顯聖澄俱以法器目之依澄最久常命代座說法師自謂吾斯未信痛念大事因緣不覺涕淚閲密雲禪師語録竊計了吾事者此老也遂參於越之吼山寓次橫機不讓密惟痛棒頭腦幾裂一時伎倆知見頓釋自是隨侍通玄黃檗益入閫奧受囑後隨住黃檗及禾之金粟旋遷天童清理南山塔院恢復東谷贖還侵田三百餘畝檇李黃承昊有記備載本志建置考繼述之功於師稱最後主徑山投老石門之福嚴順治辛丑二月十九日示寂逾數載始化獲舍利如豆大者無算分供諸方有語録二十卷行世林野奇禪師師諱通奇俗系蜀之重慶合州生而沉靜寡言笑遇葷穢輒嘔十歲父母送至金鐘寺依叔父道然師為童行十七歲剃髮慕禪寂而厭讀誦十九出峽南遊十餘載掩關當湖聞密雲禪師主金粟欲破關就學不果遣僧請益示曰教伊關中莫妄想師益疑之心智俱竭一日忽失足墮樓恍然有覺聞密禪師過吳門即日破關相隨執侍十年刃接鋒交似乎當仁不讓既受囑猶屢處天童座下踰年始應餘杭廣化之命壬午秋密禪師示寂通玄衆卜繼席三次得師名住持五載丁亥移嘉禾東塔戊子歸棲真尋遷天童巡海觀察王公爾祿機緣相叩每深洽服壬辰三月二十六日示寂臨化之際衆請留偈曰要去便去害甚熱大時有出冶首座求更名師援筆書行果二字乃云行果圓成擲筆而逝世壽五十有八塔全身於寺前新菴之左法嗣二隱謐等四十八人有全録行世牧雲門禪師師諱通門號臥菴蘇州常熟張氏子從本邑破山寺洞聞禪師祝髮後參密雲禪師得法於天童出世古南咸稱古南和尚甲申渡江掃塔遂主四明栖真復住嘉禾梅溪遷破山及鎮江鶴林壬辰延主天童尋遷秀峰凡七會語録二十卷有別集偶集懶齊集盛行於世師生平蕭散磊落蒞衆甚嚴詩章超潔書法遒徑後退休於湖村恤廬康熙辛亥十一月十五日從容舒展而逝塔全身於西資菴數年忽洪水湧塔茶毗得舍利無算其色晶瑩有投入水盆中以髮引之聯如串珠時山曉皙住持天童建舍利塔於南山浮石賢禪師師諱通賢當湖趙氏子生而厭茹葷腥志懷出世年十九潛越南海禮紹宗師剃染因歸省父母以單子苦留稍畜髮相慰後投武原普淨菴乘白師剃度受沙彌戒於雲棲蓮大師圓具於海寧湛然澄和尚隨侍嘉禾東塔聞同堂舉七賢女尸陀林話有省歸葬二親畢再參澄和尚於雲門後聞金粟密和尚道風崇峻決志歸依崇禎辛未密遷天童參入侍寮未幾思出掩關武原請辭密至其寮語之曰汝今四十七三年關許汝隨處開堂厚自保重去經二載密和尚過嘉禾破關執侍一日集衆以拂子屬師曰我用不了底付汝為衆去厥後當湖青蓮請師開法甲申冬主席遁村報昌順治戊子遷海門廣慧甲午牧雲禪師天童謝事延師住持丁酉遷嘉禾棲真己亥遷宜興善權庚子住虞山福城退老西山支公之白馬澗丁未七月二十五日入滅世壽七十有五塔全身於徑山之鵬摶峰下有語録行世師謝天童事後請山翁禪師再住遠菴㒥禪師師諱本㒥崑山陸氏子襁褓輒孤依母與兄撫育因感嫂亡尸動懼而告母求出世母曰我昔見天童僧行不凡汝果有志可往即日依命剪髮竟投天童時年二十一為崇禎壬午六月初旬也到山值密和尚退休通玄欲往求度俄阻危疾既聞密逝山翁忞禪師繼席遂從剃度前後追隨經八剎服侍十二載其間鉗錘爐韝劈面承當受付囑於崑山之安禪菴掌書記於青州之大覺寺尋應湘陰神鼎之請始為開法遷主天童凡十二載移蛟川之瑞巖未幾繼席平陽山翁示寂應鄞白雲之請尋復歸瑞巖康熙癸亥秋入寂閲世六十又一有前後語録詩集山曉皙禪師師諱本皙號嘯堂蜀長壽魏氏子母夢梵僧授如意而生髫年有出塵之志出家於本邑定慧寺研究法華楞嚴旨義年十九出蜀至金陵聽講適天童密雲和尚至長干往禮不會所問遂棄教參禪得報恩大覺指示疑情輾轉發憤頓覺遂渡錢塘參山翁禪師於雲門得契隨司職廣潤深自晦藏結茅東海郁州山中七載杜絶人事愈深操履後移西泠法華山以嘯堂名其廬及山翁再主天童招充首座即以衣鉢傳隨侍山翁應詔入都洎山翁還山世祖章皇帝留師陛見賜紫僧伽黎開法隆安寺駕臨方丈屢相問證上復舉浮山初參葉縣公案諄諭衆僧親近辦道一日駕又幸隆安稱師法席森嚴道風遠振足堪師表人天未幾龍馭升遐今上恩賜馳驛還山凡居禁庭賜賚優崇封奉祕閣轉住杭之佛日振興凋弊三載退席諸名公邀居洞庭之包山既而復主佛日又三載壬子舉住天童湖海輻輳座盈萬指鎚鍛衲子之暇彚宋元諸尊宿語成寶積録九十三卷蓋繼其師殘編未就之志也修葺殿宇及諸祖塔濬外萬工池復古山門增置田畝十載來屢欲拂衣而固留者衆力任又五載以病堅辭會當事遴弟子元靜代席丙寅仲冬示寂塔陶龕於青鳳峰之麓即密菴傑中峰塔之側也所撰述有奏對録全録後録詩有嘯堂初集偶録疉秀軒集天嶽晝禪師師諱本晝字天嶽別號寒泉子楚黃蘄春蕭氏子方四歲聽孰師誦書師云我亦能誦試之果然即令從之日記數百言稍長隨父避寇于匡廬恍若舊游處白父出家就大林寺慧公剃染鋭志苦學嬰疾遂禮誦習禪閲燈録云藏身處沒蹤迹沒蹤迹處莫藏身懷疑不已一日曉起宿鳥飛鳴有省時往參雪嶠信于開先問某甲落地二十年未知落地事信乃驀地一掌師擬議又一掌師于是服膺後依山翁忞于布水臺會天童密雲和尚示寂相隨過四明是冬即于龕前受具足戒明年忞繼席師侍立次問大慧謂參禪貴得命根斷某命根不斷時如何忞喝曰汝喚甚麼作命根師乃豁然後辭往再參信于雲門書雲門大樹四字授師又參箬菴問于夾山玉林琇于大雄皆器重之忞住台州廣潤招師至忞即升座告衆授以衣拂後結茅于黃石嵓三年移牧石菴首應龍門請開法遷海會歷主杭之佛日越之平陽杭之清流弘覺忞老人示寂復主平陽最久康熙丙子延居天童年已七十六矣皇上南巡賜宸翰并硯物到山師對使敬賦詩謝之癸未冬營壽藏于東谷乙酉春搆歸來菴退休命門人偉載乘主院事是冬書偈云辭世向誰辭西方太遠在不如遺蛻葬山阿日聽長松響天籟伏枕數日吉祥而逝世壽八十五僧臘七十三有六會語録行世詩有牧石吟直木堂晚雲樓諸集柏堂禪師師諱超靜字冷崖浙之昌化李氏子幼有異志出俗剃染首參湛菴常于南廣後依山曉皙禪師于佛日命入室司香由佛日至天童任維那多年始受記莂首衆山中別號柏堂後受姚江東山請開法三年修復殿宇四衆悅服因天童皙禪師養病中峰菴郡守萊嵩李公煦同諸縉紳延師代座說法師律已臨衆惟一嚴厲禪規整肅海內嚮風凡作務之勞以身先之不異首衆時也皙師示寂守龕一載送葬後即欲謝去因抱疴李公又延同門慰弘盛代理院事未旬日師乃怡然而逝塔全身于幻智菴後有二會録行世慰弘禪師師諱元盛字慰弘桐鄉沈氏子世業儒天資穎異具向上志出俗剃染師眼近視暗室中能一目數行著作蒼古時俱謂杼山再世因號杼山聞山曉禪師盛化佛日乃往參機契皙甚重之命為內記後隨往天童典記室尋遷第二座開法于杭之佛日三年退歸守塔于中峰菴適柏堂靜病篤李郡守萊嵩舉師繼席辛勤八年緇素趨慕無虛日後退隱于姚江說偈坐脫歸葬于玲瓏嵓南山之麓有二會録華梵集語行世杼山詩文集藏之笥中
