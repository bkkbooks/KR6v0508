body:
  text: 先覺考晉開山義興祖師前嘉靖志白川居士楊明傳云師于西晉永康元年誅茅于今寺之東谷時有童子日給薪水久而辭去曰我太白星也上帝感師道行遣侍左右言訖不見人遂稱為太白禪師因以名山蓋天童之第一祖也其遺址則今東谷菴是俗稱為小天童云惢泉居士聞性道傳云師以永康庚申來結茅東谷此地雖峰高澗曲尚未標勝而人迹亦罕至焉陸士龍言鄮縣風土之盛則曰西有大湖北有名山南有林澤此就同谷立鄮治而言故指錢湖在西也北有名山其遙指今之太白育王乎自秦時沙門室利房等至見金人飛戶而出始皇以為異漢武時霍大將軍過焉支山得休屠王祭天金神置之甘泉宮二者即佛像入中國之始也逮東漢明帝永平丁卯其法盛入攝摩騰竺法蘭為領法之沙門距義興祖師時二百三十四年尚未分宗秉法今之稱禪師者誤也是時行僧各尋山川幽邃處靜修厥後典午東移多清談名理出入彤廷朱戶乃託買山以隱不亦矯乎義師不留氏里獨栖危巒窅谷閒誰其引之區區薪水之役誰其代之惟誠則感而通太白星之為童子誰謂上帝相遣太白山之歸義師豈非本地風光歷千秋而不沒哉唐法璿禪師師之母夢吉祥天女引行摩利上宮而娠稍長即出家開元壬申入太白山披荊莽得晉時義興祖師結茅感太白星化童子日給薪水之故蹟乃建精舍於山之東麓日誦法華甚虔有天童躡雲升降捧天食來供山之又名天童因此祕書萬齊融建多寶塔於精舍西南隅師嘗繞塔夜行侍者見師身與塔齊明永樂鈔志言順陽范的嘗書碑備述其事惜今失傳焉宗弼禪師曇總禪師觀宗禪師右三師中弼總法系無稽惟觀宗嗣雲居智四祖旁出牛頭融第九世孫質疑按宋寶慶志載唐至德中僧宗弼徙寺于太白峯下列志皆仍之惟元危素朝元閣記言至德中禪師曇總來自縉雲與禪師觀宗徙太白峯下據列志有宗弼而無曇總觀宗據危記有曇總觀宗而無宗弼蓋宋志前于危記宗弼之名是確豈觀宗即宗弼一人耶但無的考今姑依本寺舊志並存以列三師之名而建置考中亦不敢有遺焉清閒禪師旁徵按明永樂鈔志載師欲建食堂已伐木於山而人力不能以出師與其徒潔設齊於峰頂祝畢天雨泉飛澗溢浮筏如箭達於其所遂成廣廈飯僧其中當夏若秋焉又與僧曇德同植夾道松凡二十里此載於乾道圖經者也開法心鏡奐禪師舊志缺今補本傳師名藏奐華亭朱氏子母方娠及生常聞異香兒時墜井有神人接持而出丱歲出家師事道曠禪師弱冠詣中嶽受具戒母泣念其遠一目不視及歸省即日而明臨喪哀毁廬墓所居院側有妖神在湖以惑漁人罿鯹四塞師諭戒之厥患遂絶後歷遊湖山靈境復詣五泄契旨於虛默默蓋嗣馬祖一也會昌間敕度師居長壽手緝大藏之燼落者南海節度楊公典姑蘇日請師歸故林以建精舍大中十二年分寧宰四明任景求捨宅為禪院迎師居之初景求之將迓師也人或難焉對曰治宅之始有異僧令大其門二十年後當有聖者來居此師至正二十一年矣剡寇裘甫卒徒二千執兵晝入師冥心晏坐神色無撓盜衆皆悸懾叩禮逡巡而退寇平郡申奏請改禪院為棲心寺以旌師德即今甬江東之補陀寺當師之居天童也在歷遊靈境時逅會昌大中之際其遺跡則徙清關之神龍於太白峰頂鎮毒蟒於小白嶺上郡守崔琪稱師凡一動止禪者畢集環堂擁榻師乃學識泉湧指鑒岐分詰難排疑之衆攻堅索隱之士皆立褰苦霧坐冸堅冰一言入神永破沉惑在天童當為開法之祖師在長壽時嘗謂衆曰昔四明天童山僧曇粹乃吾之前生也有墳塔存焉及追驗事實皆如其言以咸通七年八月三日示寂世年七十七僧臘五十七命權窆於天童巖令三載後焚身至期異香凝空發塔揭龕儼若平生茶毗巖下獲舍利數千粒紅翠交暉白光上貫弟子戒休齎舍利述行狀詣闕請諡奉敕褒誄諡曰心鏡塔曰壽相宋天目禮禪師重裝師像及僧伽像有開光法語云心鏡僧伽飾舊容分明五彩畫虛空要知空作何形假只在如今一點中且道是那一點以筆作點勢云開眼也著合眼也著咸啓禪師師會宣宗大中改元有復僧寺之詔乃請本寺充十方住持質疑舊志云師嗣洞山價及考徑山鑒宗傳云出弟子尤者天童山咸啓敕賜紫衣然則賜衣之典本山反失記載而載之於徑山宗之傳其為宗之弟子諒亦非誣况宗嗣鹽官安安嗣馬大師源流有本或先洞山而後徑山未可知也品至超世者曾經參問便欲羅之門下修録人亦不暇詳辨使然舊志於逸事中載天童有兩咸啓真說鈴也義禪師師嗣洞山價舊志總論謂曹洞宗自咸啓始繼席則義禪師其昆季也夫義名不全傳自無考據亦臆啓禪師之嗣洞山價而云然宋寶堅禪師師嗣智門祚祚嗣香林遠遠嗣雲門偃懷清禪師師嗣五祖戒戒嗣雙泉寬寬嗣雲門偃瑞新禪師集略師主天童在仁宗慶曆間時王荊國安石為鄞令交相道契有答師十遠詩云遠水悠悠碧遠山天際蒼中有山水人寄我十遠章我時在高樓徙倚觀八荒亦復有遠意千載不能忘及其經游宿寺也記云質明與其長老瑞新上石望𤫩瓏巖須猿吟者久之又有書瑞新道人壁者蓋師移主金山之龍游公訪之而師已歿其辭云始瑞新道人治其衆於天童之景德余知鄞縣愛其材能數與之游後新主此山之四年余自淮南來視蘇州之積水卒事訪焉則新既死於某月某日矣人知與不知莫不愴焉而余與之又久以深宜其悲也夫新之材信奇矣然自放於世外而人悼惜之如此彼公卿大夫操治民之勢而能以利澤加焉則其生也榮其死也哀不亦宜乎時皇祐五年六月十五日也秦少游撰懷賢行狀言賢從瑞新禪師游十有二年知宗門承襲賓主之事自雪竇移金山之龍游龍游火災之後新禪師實中興之先是雪竇顯禪師有答天童新和尚詩云中峰深且寒敧接海邊島松凋不死枝花坼未萌草飛瀑吼蛟宮幽徑分鳥道伊余空寂淹浮光寄枯槁冥遊天地間誰兮可尋討孤立雲霞外誰兮可長保兹來仁者來還稱太白老荷策扣巖扃重席展懷抱示我商頌清休誇郢歌好報投慚抒辭難以倫嘉藻又和頌云𤫩瓏巖古寺冠乎明越境海眼通冽泉天心聳危嶺嘗遊興未闌遐想神忽凝彼士真覺雄相鄰不孤迥吾愛濟橫流孰云煩慮屏吾愛整頽綱豈止浮根重棲梧鳳九苞追風駿千影顧我不爭衡與誰閒鬬茗乘時既磊落照世非昏暝佇為王者師三千統摩頂集略如此普禪師雪竇顯禪師送師詩云迢迢別海涯帆挂杪秋時島樹落寒葉人誰訪祖師浪開游象急天闊過鴻遲早晚歸林下千徒不共知質誤瑞新禪師自天童遷金山嗣歸宗柔續燈録以金山新嗣福昌善分兩人誤清簡禪師補略師錢塘張氏子性孤潔時號簡浙客嗣歸宗柔晚居雪竇而終塔於資聖寺之東南隅宋孝宗題師遺像惜無傳可稽子凝禪師師重植夾道松二十里嘗與延慶法智師知禮辨十不二門指要鈔義中引達磨門下三人語纍書往返詳悉師嗣崇壽稠稠嗣法眼雪竇顯禪師寄師詩云經旬抱疾阻春霖莎砌重重蘚暈侵曾約偕遊未能得暮山空鎖碧雲深利章禪師師嗣雪竇顯顯嗣智門祚清遂禪師師嗣石霜圓其法嗣大中立志靈隱慧中乾元惟圜萬壽應城淡交禪師師嗣雲居舜雲門偃第六世孫可齊禪師師台州應氏子依天台國清道才剃染得法於圓照本本嗣天衣懷懷嗣雪竇顯師初住安樂山晚遷天童佛國惟白禪師師靖江人嗣法雲秀初主天童徽宗召入禁中三登高座敕命留住東京法雲寺進所撰續傳燈録三十卷帝御製序敕入大藏其法嗣十四人佛鑑惟仲乾明永因智者紹先勝因崇愷福聖仲易月印慧海建隆原普照法最天寧修慧濟普虔二祖璇果羅漢遇三祖策廣教堯普交禪師備傳師邑萬齡鄉畢氏之子自幼穎悟未冠從釋初住錢塘南屏山聽天台教觀因修懺悔佛事途遇道人問曰師之懺罪為自懺耶為懺它耶若自懺罪性何來若懺它它罪非汝烏能懺之師不能對歸語南屏亦不能決遂憤然辭去遍行尋訪逮造泐潭潭知其為法器見入門即訶之擬問則杖之使去不復敢進一日忽呼曰我有古人公案要與商量何不自室中來師擬進潭喝之豁然有省呵呵大笑潭下繩牀執師手曰汝會佛法耶師以手托開亦喝之潭呵呵大笑而坐師以偈呈曰若人問我解何宗一喝須教兩耳聾滿杓黃虀飽喫了生涯總在鉢盂中自是機辨迅發學徒爭歸之士大夫數虛席以迎師悉遁去歸隱天童山掩關却掃者八年會寺虛席郡僚邀師甚力遣吏候於道師不得遁居之六年引退以宣和六年三月二十日沐浴升座留偈辭衆曰寶杖敲空觸處春光陰電掣舊曾聞昨宵風動寒巖冷驚起泥牛耕白雲擲筆坐逝俗壽七十七僧臘五十八闍維獲五色舍利頂骨牙齒不壞塔於天童寺山之西原中書舍人黃龜年為之銘師修持清苦行履孤潔正揚祖令灑落軼羣陳忠肅公瓘嘗贊之曰拶破黃龍第四關世人猶問生緣法其推重源流若此師嗣泐潭乾乾嗣東林總總嗣黃龍南南嗣石霜圓嗣法者三十餘人能傳師之道闡揚於時者雲巖泰誠香山彥文吉祥清逢智門行潛茂椿圓應太平子瑫德圓道場山曇俊宏智覺禪師本傳師諱正覺隰州李氏子母趙夢五臺僧解右臂環與之而孕及生右臂隆起如環狀七歲日誦數千言佛陀遜禪師一見知其為法器年十一得度十四具戒十八遊方首參枯木成禪師一日聞僧誦法華經至父母所生眼悉見三千界句瞥然有省走白成成指香合曰裏許是什麼物師曰是什麼心行成曰汝悟處又作麼生師手畫圓相以呈復拋向後成曰弄泥團漢有什麼限師曰錯成曰別見人始得師諾諾造丹霞淳公問如何是空劫以前自己師曰井底蝦蟆吞却月三更不借夜明簾公曰未在更道師擬議公打一拂子曰又道不借師言下釋然遂作禮公曰何不道取一句師曰某甲今日失錢遭罪公曰未暇打得汝且去自是機鋒迅捷諸方推重公領大洪師掌箋記後命首衆得法者已數人四年過圓通時真歇住長蘆遣僧邀至衆出迎見其衣舄穿敝且易之真歇俾侍者易以新履師却曰吾為履來耶衆聞心服懇求說法居第一座六年出世住泗州普照時年三十有四歷遷舒州太平江州圓通能仁真州長蘆建炎末乃住天童金人犯明州諸寺多遭燬師獨危坐不去掠騎至塔嶺以望若有所見而退嘗被旨移靈隱未越月丐歸住山凡三十年為人方厲機鋒峻激所著麗而有則住持以來受無貪而施無厭歲雖歉贍衆之餘猶賴全活者數萬殿堂樓閣輝映東南隨願而就紹興丁丑九月謁別諸檀越十月己亥還山翊日沐浴更衣端坐告衆作書遺大慧杲公邀主後事復別以偈曰鈍鳥先飛易靈龜脫殼難我無你不去你無我不行又書偈示衆曰夢幻空花六十七年白鳥烟沒秋水連天擲筆而逝塔全軀於東谷紹興戊寅詔諡曰宏智塔曰妙光師嗣丹霞淳洞山第十世孫塔稱十六代住持其法嗣詳周龍圖葵塔銘序法為禪師師天台鮑氏子嗣宏智覺初住隨州大洪為天童十七代住持大休宗玨禪師師嗣真歇了了嗣丹霞淳其法嗣雪竇鑑附紀雪竇智鑑號足菴玨嗣止一人續燈録又以鑑作真歇了法嗣未免有誤應菴華禪師本傳師諱曇華蘄之黃梅江氏子生而奇傑年十七剃髮東禪明年杖錫參訪首依水南遂禪師染指法味因遍歷江湖與諸老激揚無不契者然終弗輕自肯上雲居禮佛果勤禪師痛與提策會入蜀乃指見彰教隆公隆即勤之子也隆移虎丘師侍行未半載頓明大法隨與此菴時號元布袋者同行博約深奧又相從於護國相得甚歡初分座處之連雲尋開法妙嚴纍遷巨剎如明果