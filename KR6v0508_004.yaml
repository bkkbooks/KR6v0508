body:
  text: 盛典考舊志缺賜額唐肅宗皇帝乾元二年己亥敕賜天童山額為𤫩瓏禪寺懿宗皇帝咸通十年己丑敕賜天童𤫩瓏寺額為天壽寺宋真宗皇帝景德四年丁未敕賜天童天壽寺額為景德寺元成宗皇帝大德五年辛丑敕賜天童景德寺千佛閣額曰朝元寶閣順帝至正二十年庚子敕賜天童景德寺重建萬佛閣曰朝元國朝世祖章皇帝順治十六年己亥敕賜天童景德寺額為弘法寺欽召宋神宗皇帝召天童寺僧惟白入禁中問道三登高座宋孝宗皇帝召天童寺僧了朴入禁內講道宋理宗皇帝召天童寺僧智謀三入禁內問道明洪武五年壬子太祖高皇帝詔兩浙高僧較讎內典天童寺僧司聰應召明洪武十年丁巳太祖高皇帝詔兩浙有道行僧入見內庭天童寺僧智昌應召入見親奉綸音令制天下僧徒以晝講夜禪之規明宣德元年丙午宣宗皇帝敕召天童僧淨觀至京陛見稱旨館於慶壽丈室授左講經明宣德九年甲寅宣宗皇帝敕召天童僧祖淵入京命為左覺義旋升右善世國朝順治十六年閏三月世祖章皇帝敕召天童寺禪僧道忞來京皇帝敕諭朕惟善政導民期適蕩平之路仁風扇物統歸化育之中仰千聖之徽猷遡百王之遺軌理無分於三教道豈外於一心故佛演法門立闡揚之大旨祖標禪理示默契之真宗皆所以迥脫疑情頓開覺性惟曹溪之一脈儼雞足之上乘暨臨濟之三玄允象王之法乳慧雨普施於一切宗風常勝於五燈緣衍法之獨隆斯傳衣之最衆朕撫臨寰宇心切牖民期與四海蒼生共臻覺路必使明心而見性方能易惡而至中時覽經文間嘗參究續圜頓交融之旨必行解相應之人聞爾禪僧道忞臨濟正傳宗門法器戒行清峻不染六欲之塵道眼圓明能空四諦之妄風規早著解脫有年憫結習之牽纏揭單傳之要渺是用特遣僧籙司右闡教淨行禪僧法璽齎敕前往欲闡玄風竚聞高論爾其洗鉢就道持錫往征無耽深隱之清用慰遠延之切嗚呼弘宣大道復淳古之休風廣度迷情躋含生於壽域欽承朕命式賁爾宗欽哉故諭賜號并紀敕印宋建中靖國元年辛巳徽宗皇帝敕賜天童景德寺兼住法雲寺僧惟白號曰佛國禪師元至順元年庚午文宗皇帝敕賜天童景德寺僧懷信號曰廣慧妙悟智寶弘教禪師元順帝至正二年壬午帝師錫天童育王兼領僧悟光號曰佛日圓明普濟禪師元至正二十年庚子順帝敕賜天童景德寺僧元良號曰善覺普光禪師明洪武十五年壬戌太祖高皇帝敕賜天童景德寺僧自性號曰佛朗禪師明永樂十三年甲午成祖皇帝敕賜天童景德寺僧淨觀號曰弘慈普應禪師明宣德二年丁未進封定巖惠濟禪師國朝順治十七年庚子四月世祖章皇帝敕封天童弘法寺禪僧道忞號曰弘覺禪師并錫以印皇帝敕諭朕惟佛會拈華妙心傳於迦葉禪行面壁宗旨付於神光六葉既敷千華競秀蔭法雲於真際火宅晨凉耀慧日於康衢重昏夜曉以至瞚目揚眉擎拳舉指類皆合宗門之妙諦得教外之靈機誠非它學可知亦豈意生所度眷言道行冀覿高蹤實悟真如必先玄覺咨爾禪僧道忞嗣法天童傳宗臨濟克證無生之旨機自玄明允通向上之關悟稱諦當稽載稽籍祈會性真間覽玄文深嘉妙義故時於聽政之暇詢爾以法道之微乃名言之不繁克隨機而得解玄關幽鍵感即能通遙源濬波酌之不竭傳一燈於種智了萬法於真空廣量出於凡心元明踰於宿學引之於有高謝四流推之於無俯弘六度信乎凡之可以證聖洵哉惟覺所以悟迷非同測海窺天固已登堂入室堪主法門之席允稱禪衆之尊是用封爾為弘覺禪師錫之敕印於戲慈周萬有大身遍於十方利濟四生本覺超乎三世俾舉代咸登仁壽之域在隨方而啓般若之門其益懋爾勤修庶弘開夫正梵式承嘉命丕闡宗風欽哉故諭欽賜銀印一顆計重四十兩方廣三寸許左滿書右漢篆其文曰弘覺禪師之印邊旁鐫滿文一行頂鐫漢文順治十七年造覆斗鈕貫以黃絲縧朱盝韞之盝遍飾以鍮賜衣唐咸通元年庚辰懿宗皇帝賜天童𤫩瓏寺僧咸啓紫衣一襲宋開寶二年己巳二月詔十方禪院長春節上表賜紫衣號時住持僧失稽宋元豐八年乙丑神宗皇帝賜天童景德寺僧惟白金襴紫衣一襲元至順元年庚午文宗皇帝賜天童景德寺僧懷信金襴法衣一襲明永樂年成祖皇帝賜天童景德寺僧淨觀紫衣一襲明崇禎十四年辛巳懷宗皇帝命戚畹田弘遇進香補陀齎紫衣一襲賜天童寺僧圓悟國朝順治十六年己亥十月世祖章皇帝賜應召天童寺禪僧道忞三衣一襲黃衣一襲緑雲段道袍一襲順治十七年庚子春賜七衣一襲沉香色道袍一襲白短衣一領鞋襪一副是夏賜三衣一襲宮䌧道袍一襲是冬差官齎送千針衲衣一襲五衣七衣各一襲黃祖衣一襲夾衣一領是歲又特賜隨召天童侍僧本皙紫僧伽黎一襲開法都中隆安寺又賜母絲布衣三襲黃雲段衣一襲段直身二襲御製宋建中靖國元年辛巳八月十五日徽宗皇帝御製天童景德寺僧惟白續燈録序其文曰釋迦如來之出世也受然燈之記生淨飯王家分手指乎天地而其機也已露遊門觀於老死而幻緣也頓寂及乎唱道雞園騰芳鷲嶺無邊剎境遂現於一毫之端大千經卷畢出於微塵之表西被竺土東流震旦編葉而書則一時聖法雖傳於慶喜拈花而笑則正法眼藏獨付乎飲光自達磨而來實為初祖其傳四七二三而至於曹溪於是雙林之道逾光一滴之流寖廣自南嶽青原而下分為五宗各擅門風應機酬對雖建立不同而會歸於一莫不箭鋒相拄鞭影齊施接物利生啓悟多矣源派廣迤枝葉扶疏而雲門臨濟二宗遂獨盛於天下朕膺天寶命紹國大統恭惟藝祖闢度門於綿㝢太宗闡祕義於敷天章聖傳燈於景德永昭廣燈於天聖皆宏畼真風協助神化以成無為之治者也於皇神考尤嚮空宗元豐五年詔于大相國寺創二大禪剎闢惠林于東序建智海于西廡壬戌之歲以越國大長公主及集慶軍節度觀察留後駙馬都尉張敦禮之請復建法雲禪寺于國內之南於是祖席光輝叢林鼎盛天下襲方袍慕禪悅者雲集于上都矣今敦禮以其寺住持僧佛國禪師惟白所集建中靖國續燈録三十卷來上且以序文為請惟白探最上乘了第一義屢入中禁三登高座宣揚妙旨良愜至懷昔能仁說法華經放眉閒白毫相光照東方萬八千世界而彌勒發問文殊決疑以謂日月燈明佛本光瑞如此持是經者妙光法師得其證者普明如來今續燈之名蓋燈燈相續光光相入義有在於是矣噫圓澄覺海本含裹于十方生滅空漚遂沉淪于三有因明立所繇塵發知識妄相仍轉入諸趣良可悲也若回光內照發真歸元則是録也直指性宗單傳心印可得于眉睫可薦于言前舉手而擎妙喜世界彈指而現莊嚴樓閣神通妙用真不可思議者也嘉於有衆締此勝緣俱離迷津偕之覺路斯朕之志也御書御畫宋淳熙五年戊戌孝宗皇帝御書太白名山四大字賜天童景德寺又御題住持僧清簡遺像贊明宣德元年丙午宣宗皇帝御書題僧伽像賜左講經天童僧淨觀有玉璽刻石北京金剛寺國朝順治十七年庚子世祖章皇帝賜天童應召僧道忞御書唐詩一幅詩曰洞房昨夜春風起遙憶美人湘江水枕上片時春夢中行盡江南數千里後識庚子冬日書又御書敬佛二大字末識為木陳老人書御章曰體元齊又曰太和主人御畫白綾山水一軸題云順治丙申夏日御筆倣小米筆意引章曰體元齊又章曰萬機餘暇御璽廣運之寶又御筆水墨葡萄一幅又密雲圓悟禪師像一軸因門人道忞進閩人曾鯨所繪像即命供奉王國材臨摹二幀其一沉香龍座備極莊嚴聖駕親送至萬善方丈指所畫衣摺曰此皆朕手自著墨也賜藏天童又賜弘覺禪師道忞立像一軸云中有御筆所增處又賜隨召天童寺僧本皙御書敬佛二字又梵網經春城乞食還唐詩十種唐詩手卷又唐詩五幅額二一曰堯天舜日二曰松風水月聯五一曰無法向人說將心與汝安二曰孤雲臥此中萬山拜其下三曰大護法不見僧過善知識能調物情四曰一池荷葉衣無盡數畝松花食有餘五曰千里為重重水重山重慶府一人為大大邦大國大明君蓋問師生緣而書也又賜楞嚴會解六祖壇經講筵恭紀客問評注廟堂碑帖九成宮帖多寶塔帖今上康熙三十五年丙子賜御書石刻金剛經一卷四十二年癸未賜御書名香清梵額賜佛神寶像國朝順治十七年庚子世祖章皇帝出內殿所供鏐金藥師如來一尊關帝乘馬像一座關小侯周將軍像二座備極珠寶金銀裝飾賜天童弘法寺供奉賜録入藏宋建中靖國元年辛巳徽宗皇帝賜法雲僧前住天童佛國惟白禪師續燈録三十卷御製序文入大藏國朝順治十七年庚子世祖章皇帝賜故住持天童寺僧圓悟密雲禪師語録一十二卷入大藏其門人道忞所疏請也進天童密雲悟禪師語録奏章浙江寧波府鄞縣天童禪師臣僧道忞謹奏為恭懇天恩賜將先師語録入藏以光祖道以茂皇猷事皇上統承精一道契真宗性命之學尤深致意至於古聖語言有關世道人心者尤必廣布頒行使若見若聞各達本性方愜御衷真覺皇之慈心振古希有者矣道忞幸逢盛化身叨寵遇又每承天眷追念先師賜邈頂相復刻遺編感恩已渥復敢何求唯是𥾝念天童先師圜悟生當末運興振禪宗六坐名山忘軀荷法一時提唱機語皆開鑿人天單明直指日雖刻布人間但未經入藏恐慚湮沒道忞伏見宋景德年中僧道原所著傳燈録三十卷頒降入藏元祐閒明教禪師契嵩所著輔教編三卷及傳法正宗記一十二卷亦賜入藏乾道七年僧蘊聞所進大慧禪師宗杲語録三十卷亦賜入藏元元統二年僧善達密的理所進其師普應國師明本語録三十卷皆賜入藏此四者人雖異代咸遇清時道法耿光於今維烈况忞生值昌期之運躬逢佛心天子重法之秋誠千載一時奇遇謹扳前件事例將先師圜悟語録一拾二卷與忞所編年譜陸拾二帙先經繕寫進呈外伏乞俯鑒微忱下頒鈞旨賜收入大藏永使流通則正法眼千古長新而願力恩普天均戴者矣為此冒昧具奏懇賜下部施行忞不勝翹禱待命之至謹具奏聞順治十七年三月二十三日奉旨禮部議奏本月二十九日禮部覆奏本日奉旨依議賜牒唐貞觀二十二年戊申太宗皇帝詔度僧五人宋寶祐六年戊午理宗皇帝賜天童景德寺度牒五十道賜碑元至正二十三年癸卯順帝敕中書參知政事危素撰天童景德寺朝元閣碑銘賜帑金國朝順治十七年庚子天童弘法寺弘覺禪師道忞應召還山世祖章皇帝賜帑金千兩命修佛殿是歲又發帑金五百兩命道忞修理雲門雪嶠大師圓信藏塔頒有御札其略曰朕每念法門輒景先哲知雪嶠大師藏塔卓立雲門後學諸方應共瞻仰比聞山界雖分基址漸圮恐年深人遠凌毁堪虞今特捐五百金重為修治雖未必足窣波之費然經朕一為整葺人必改觀起敬自不敢復行侵侮矣禪師重念儀型久懷崇飾當勉為經理承朕敬禮尊宿之義以副夙心賜諡塔唐咸通七年丙戌懿宗皇帝敕賜前住天童栖心寺僧藏奐諡曰心鏡禪師塔曰壽相之塔宋紹興二十八年戊寅高宗皇帝敕賜天童景德寺僧正覺諡曰宏智禪師塔曰妙光之塔國朝康熙四十四年乙酉賜天童密雲禪師諡曰慧定禪師賜賻致奠特恩送葬元順帝至正十七年丁酉明太祖時為吳國公督師江陰還金陵聞前住天童大天界寺僧懷信之訃詔出內府幣帛以助葬事且命堪輿家賀齊叔卜藏地舉龕之夕親臨致奠駕送都門之外明正統十四年己巳英宗皇帝遣太監吳弼齎金鈔香幣賻弔前住持天童寺僧任右善世祖淵又遣禮部主事林璧致奠親藩雅賚國朝順治庚子歲鎮國公霓菴贈山翁和尚手畫山水一幅題云庚子之歲元宵前一日五夜朝罷歸來晨光猶未大散素知天童和尚號山翁者深悟三昧無上菩提久隱西巖而弗出今蒙帝恩詔入萬善殿時講暮談大為聖悅余雖久聞尚未面晤似覺歉然于懷也隨至蓮寓瞻覩慈顏果法品而非凡其談柄辨鋒令人聞見生歡至于禪之餘者又無所不極矣偶爾言及書畫向余索之余於筆墨况素不善致辭別來迄今已十餘日矣南窗無事勉强塗鴉戲法雲林幸禪師勿軒渠也識曰東來堂物外主人引章曰東來堂又章曰敬一曰物外主人又手鐫品章二方禪深三昧動天恩詔古今無多圖書永贈識曰敬一主人丁未歲寄弘覺禪師手畫山水二幅其一題曰迂老變宋元諸名家畫而出以疏淡如陳正字淘洗六朝鉛華都盡其天韻自不可及款云時丁未秋日為弘覺禪師寫霓菴引章曰華萼居圖書又章曰國則曰輔國公章其一題云摩詰謂雲峰石迹迥出天機筆意縱橫參乎造化迂老得之識云時丁未秋日霓菴畫并題章曰敬一主人曰國則又贈詩一律書扇詩云聖朝存象法古寺復聞鐘花引山門路雲開野殿松高齊談靜理遠嶼見秋容日暮還攜杖月明林外峰又寄贈黃玉玦一枚水晶方印池一座皆祕府上珍也前後皆有手札別載表貽考又贈山曉禪師本皙山水一幅圖章一方
